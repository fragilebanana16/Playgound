<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>WPF WebSocket Client - 压力测试版</title>
    <style>
        body { font-family: sans-serif; padding: 20px; color: #333; }
        #log { background: #1e1e1e; color: #d4d4d4; padding: 10px; height: 350px; overflow-y: auto; border-radius: 4px; font-family: monospace; font-size: 12px; }
        .group { background: #f8f9fa; border: 1px solid #ddd; padding: 15px; margin-bottom: 15px; border-radius: 8px; }
        .label { font-weight: bold; display: inline-block; width: 100px; }
        input { padding: 5px; width: 80px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 6px 15px; cursor: pointer; border-radius: 4px; border: 1px solid #007bff; background: #fff; color: #007bff; }
        button:hover { background: #007bff; color: #fff; }
        button.active { background: #dc3545; border-color: #dc3545; color: #fff; }
        .status { margin-left: 10px; font-size: 0.9em; }
    </style>
</head>
<body>
    <h2>WebSocket 交互测试终端</h2>

    <div class="group">
        <button onclick="connect()">🔌 连接服务</button>
        <button onclick="disconnect()">🔌 断开连接</button>
        <span id="wsStatus" class="status">未连接</span>
    </div>

    <div class="group">
        <span class="label">手动控制:</span>
        <input type="number" id="fanPercent" value="65" min="0" max="100"> %
        <button onclick="sendSetFan()">发送单次</button>
    </div>

    <div class="group">
        <span class="label">随机模式:</span>
        间隔 <input type="number" id="intervalMs" value="1000"> ms
        范围 <input type="number" id="minVal" value="0"> - <input type="number" id="maxVal" value="100"> %
        <button id="btnAuto" onclick="toggleAutoSend()">开启随机发送</button>
    </div>

    <h3>实时日志：</h3>
    <pre id="log"></pre>

    <script>
        let ws = null;
        let autoTimer = null;

        function log(message) {
            const logEl = document.getElementById('log');
            const time = new Date().toLocaleTimeString();
            logEl.textContent += `[${time}] ${message}\n`;
            logEl.scrollTop = logEl.scrollHeight;
            // 限制日志长度，防止页面卡死
            if (logEl.textContent.length > 10000) {
                logEl.textContent = logEl.textContent.substring(5000);
            }
        }

        function connect() {
            if (ws) return;
            ws = new WebSocket('ws://127.0.0.1:8080/data');
            ws.onopen = () => {
                log('✅ 已连接');
                document.getElementById('wsStatus').textContent = '已连接';
                document.getElementById('wsStatus').style.color = 'green';
            };
            ws.onclose = () => {
                log('❌ 连接关闭');
                document.getElementById('wsStatus').textContent = '未连接';
                document.getElementById('wsStatus').style.color = 'red';
                stopAutoSend(); // 断开时停止自动发送
            };
            ws.onmessage = (e) => log('📥 收到: ' + e.data);
        }

        function disconnect() {
            if (ws) { ws.close(); ws = null; }
        }

        // 核心发送函数
        function emitValue(val) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                const cmd = { command: "SetFanSpeed", percent: val };
                ws.send(JSON.stringify(cmd));
                return true;
            }
            return false;
        }

        function sendSetFan() {
            const val = parseInt(document.getElementById('fanPercent').value);
            if (emitValue(val)) {
                log(`🚀 手动发送: ${val}%`);
            } else {
                log('⚠️ 发送失败，请检查连接');
            }
        }

        // 随机发送逻辑
        function toggleAutoSend() {
            if (autoTimer) {
                stopAutoSend();
            } else {
                startAutoSend();
            }
        }

        function startAutoSend() {
            const ms = parseInt(document.getElementById('intervalMs').value);
            const min = parseInt(document.getElementById('minVal').value);
            const max = parseInt(document.getElementById('maxVal').value);

            if (ms < 10) { alert('间隔太短了！'); return; }

            log(`▶️ 开启随机模式，频率: ${ms}ms`);
            const btn = document.getElementById('btnAuto');
            btn.textContent = '停止随机发送';
            btn.classList.add('active');

            autoTimer = setInterval(() => {
                const randomVal = Math.floor(Math.random() * (max - min + 1)) + min;
                if (emitValue(randomVal)) {
                    log(`🎲 自动发送: ${randomVal}%`);
                }
            }, ms);
        }

        function stopAutoSend() {
            if (autoTimer) {
                clearInterval(autoTimer);
                autoTimer = null;
                log('⏸️ 已停止自动发送');
                const btn = document.getElementById('btnAuto');
                btn.textContent = '开启随机发送';
                btn.classList.remove('active');
            }
        }
    </script>
</body>
</html>
