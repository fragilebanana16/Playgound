<!DOCTYPE html>
<html lang="en">

<head>
	<title>three.js webgl - postprocessing - Screen Space Reflection</title>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <style>
#modelInput {
  position: fixed;   /* 或 absolute */
  top: 16px;
  right: 16px;
  z-index: 99999;
}
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
}

#container {
  width: 100%;
  height: 100%;
}

canvas {
  display: block; /* 消除 inline 元素底部间距 */
}

#info {
  position: fixed;
  top: 0;
  left: 0;
}
</style>
</head>

<body>
	<div id="container">
    	<div id="info">
<input type="file" id="modelInput" accept=".glb,.gltf" style="display:none">
<label for="modelInput" style="
  position: fixed;
  top: 16px;
  right: 16px;
  z-index: 999;
  padding: 8px 16px;
  background: rgba(0,0,0,0.6);
  color: white;
  border-radius: 8px;
  cursor: pointer;
  backdrop-filter: blur(4px);
">
  📂 打开模型
</label>
	</div>
    </div>


	<script src="../libs/three.js"></script>
	<script src="../libs/GLTFLoader.js"></script>
	<script src="../libs/shaders/CopyShader.js"></script>
	<script src="../libs/shaders/SSRShader.js"></script>
	<script src="../libs/postprocessing/Pass.js"></script>
	<script src="../libs/postprocessing/SSRPass.js"></script>
	<script src="../libs/postprocessing/EffectComposer.js"></script>
	<script src="../libs/postprocessing/ShaderPass.js"></script>
	<script src="../libs/shaders/GammaCorrectionShader.js"></script>

	<script src="../libs/objects/ReflectorForSSRPass.js"></script>

	<script>
		const params = {
			enableSSR: true,
			groundReflector: true,
		};

		let composer;
		let ssrPass;
		let camera, scene, renderer;
		const otherMeshes = [];
		let groundReflector;
		const selects = []; // SSR 需要反射的对象都丢进这个数组

		// 手动相机控制用的全局变量
		let isDragging = false;
		let prevMouse = { x: 0, y: 0 };
		let spherical;
		const target = new THREE.Vector3(0, 0.0635, 0);
		let lastTouchDist = 0;

		const container = document.querySelector('#container');

		init();
		animate();

		function init() {

			// --- Camera ---
			camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 15);
			camera.position.set(0.13271600513224902, 0.3489546826045913, 0.43921296427927076);

			// --- Scene ---
			scene = new THREE.Scene();
			//scene.background = new THREE.Color(0x443333);
			//scene.fog = new THREE.Fog(0x443333, 1, 2);

			// --- Ground ---
			const plane = new THREE.Mesh(
				new THREE.PlaneGeometry(2, 2),
				new THREE.MeshPhongMaterial({ color: 0x999999, specular: 0x101010 })
			);
			plane.rotation.x = -Math.PI / 2;
			plane.position.y = -0.0001;
			//scene.add(plane);

			// --- Lights ---
			const hemiLight = new THREE.HemisphereLight(0x443333, 0x111122);
			scene.add(hemiLight);

			const spotLight = new THREE.SpotLight();
			spotLight.angle = Math.PI / 16;
			spotLight.penumbra = 0.5;
			spotLight.position.set(-1, 1, 1);
			scene.add(spotLight);

			// --- 原有的几个几何体（参考用，可以注释掉） ---
			let geometry, material, mesh;

			geometry = new THREE.BoxGeometry(.05, .05, .05);
			material = new THREE.MeshStandardMaterial({ color: 'green' });
			mesh = new THREE.Mesh(geometry, material);
			mesh.position.set(-.12, .025, .015);
			scene.add(mesh);
			otherMeshes.push(mesh);
			selects.push(mesh); // 加入 SSR 反射列表

			geometry = new THREE.IcosahedronGeometry(.025, 4);
			material = new THREE.MeshStandardMaterial({ color: 'cyan' });
			mesh = new THREE.Mesh(geometry, material);
			mesh.position.set(-.05, .025, .08);
			scene.add(mesh);
			otherMeshes.push(mesh);
			selects.push(mesh);

			geometry = new THREE.ConeGeometry(.025, .05, 64);
			material = new THREE.MeshStandardMaterial({ color: 'yellow' });
			mesh = new THREE.Mesh(geometry, material);
			mesh.position.set(-.05, .025, -.055);
			scene.add(mesh);
			otherMeshes.push(mesh);
			selects.push(mesh);

			// --- Ground Reflector (SSR 用) ---
			geometry = new THREE.PlaneGeometry(10, 10);
			groundReflector = new THREE.ReflectorForSSRPass(geometry, {
				clipBias: 0.0003,
				textureWidth: window.innerWidth,
				textureHeight: window.innerHeight,
				color: 0x888888,
				useDepthTexture: true,
			});
			groundReflector.material.depthWrite = false;
			groundReflector.rotation.x = -Math.PI / 2;
			groundReflector.position.y = 0.0;
			groundReflector.visible = true;
			const boxHelper = new THREE.BoxHelper(groundReflector, 0xffff00);
            scene.add(boxHelper);
			scene.add(groundReflector);

			// --- Renderer ---
			renderer = new THREE.WebGLRenderer({ antialias: true });
renderer = new THREE.WebGLRenderer({ antialias: true }); // 原来是 false
renderer.setPixelRatio(window.devicePixelRatio);         // 加这行
renderer.setSize(window.innerWidth, window.innerHeight);
			container.appendChild(renderer.domElement);

			// --- 手动鼠标控制（拖拽旋转，滚轮缩放） ---
			spherical = new THREE.Spherical().setFromVector3(camera.position);

			renderer.domElement.addEventListener('mousedown', function (e) {
				isDragging = true;
				prevMouse.x = e.clientX;
				prevMouse.y = e.clientY;
			});

			renderer.domElement.addEventListener('mousemove', function (e) {
				if (!isDragging) return;
				const deltaX = e.clientX - prevMouse.x;
				const deltaY = e.clientY - prevMouse.y;
				prevMouse.x = e.clientX;
				prevMouse.y = e.clientY;

				spherical.theta -= deltaX * 0.005;
				spherical.phi -= deltaY * 0.005;
				spherical.phi = Math.max(0.1, Math.min(Math.PI - 0.1, spherical.phi));
			});

			renderer.domElement.addEventListener('mouseup', function () { isDragging = false; });
			renderer.domElement.addEventListener('mouseleave', function () { isDragging = false; });

			renderer.domElement.addEventListener('wheel', function (e) {
				e.preventDefault();
				spherical.radius += e.deltaY * 0.001;
				spherical.radius = Math.max(0.1, Math.min(10, spherical.radius));
			}, { passive: false });

			renderer.domElement.addEventListener('touchstart', function (e) {
				if (e.touches.length === 1) {
					isDragging = true;
					prevMouse.x = e.touches[0].clientX;
					prevMouse.y = e.touches[0].clientY;
				} else if (e.touches.length === 2) {
					isDragging = false;
					lastTouchDist = Math.hypot(
						e.touches[0].clientX - e.touches[1].clientX,
						e.touches[0].clientY - e.touches[1].clientY
					);
				}
			});

			renderer.domElement.addEventListener('touchmove', function (e) {
				e.preventDefault();
				if (e.touches.length === 1 && isDragging) {
					const deltaX = e.touches[0].clientX - prevMouse.x;
					const deltaY = e.touches[0].clientY - prevMouse.y;
					prevMouse.x = e.touches[0].clientX;
					prevMouse.y = e.touches[0].clientY;
					spherical.theta -= deltaX * 0.005;
					spherical.phi -= deltaY * 0.005;
					spherical.phi = Math.max(0.1, Math.min(Math.PI - 0.1, spherical.phi));
				} else if (e.touches.length === 2) {
					const dist = Math.hypot(
						e.touches[0].clientX - e.touches[1].clientX,
						e.touches[0].clientY - e.touches[1].clientY
					);
					spherical.radius += (lastTouchDist - dist) * 0.005;
					spherical.radius = Math.max(0.1, Math.min(10, spherical.radius));
					lastTouchDist = dist;
				}
			}, { passive: false });

			renderer.domElement.addEventListener('touchend', function () { isDragging = false; });

			// --- Resize ---
			window.addEventListener('resize', onWindowResize);

			// --- Composer / SSR ---
			composer = new THREE.EffectComposer(renderer);
            composer.setPixelRatio(window.devicePixelRatio);
			ssrPass = new THREE.SSRPass({
				renderer,
				scene,
				camera,
				width: innerWidth,
				height: innerHeight,
				groundReflector: params.groundReflector ? groundReflector : null,
				selects: params.groundReflector ? selects : null
			});

			composer.addPass(ssrPass);
			composer.addPass(new THREE.ShaderPass(THREE.GammaCorrectionShader));

			ssrPass.thickness = 0.018;
			ssrPass.infiniteThick = false;
			ssrPass.maxDistance = .021;
			groundReflector.maxDistance = ssrPass.maxDistance;

			ssrPass.opacity = 1;
			groundReflector.opacity = ssrPass.opacity;

			// --- 加载 GLTF ---
			loadGLTF();
		}

		// ============================================================
		// GLTF 加载逻辑
		// ============================================================
		function loadGLTF() {

			const gltfLoader = new THREE.GLTFLoader();
			let currentModel = null; // 记录当前加载的模型，方便替换时清除

			document.getElementById('modelInput').addEventListener('change', function (e) {
				const file = e.target.files[0];
				if (!file) return;

				// 如果已有模型，先从场景里移除，并清理 selects
				if (currentModel) {
					currentModel.traverse(function (child) {
						if (child.isMesh) {
							const idx = selects.indexOf(child);
							if (idx !== -1) selects.splice(idx, 1);
						}
					});
					scene.remove(currentModel);
					currentModel.traverse(function (child) {
						if (child.isMesh) {
							child.geometry.dispose();
							if (child.material.dispose) child.material.dispose();
						}
					});
					currentModel = null;
				}

				// 用 ObjectURL 把本地文件转成可访问的 URL
				const objectURL = URL.createObjectURL(file);

				gltfLoader.load(
					objectURL,

					function (gltf) {
						currentModel = gltf.scene;
						currentModel.scale.set(1, 1, 1);
						scene.add(currentModel);

						// 遍历模型里所有 Mesh，丢进 selects，让 SSR 能反射
						currentModel.traverse(function (child) {
							if (child.isMesh) {
								selects.push(child);
							}
						});

						// 用完释放 ObjectURL
						URL.revokeObjectURL(objectURL);

						console.log('模型加载完成，SSR selects 共', selects.length, '个对象');
					},

					function (xhr) {
						if (xhr.lengthComputable) {
							console.log('加载进度:', (xhr.loaded / xhr.total * 100).toFixed(1) + '%');
						}
					},

					function (error) {
						console.error('加载失败:', error);
						URL.revokeObjectURL(objectURL);
					}
				);
			});
		}

		// ============================================================
		// Resize / Animate / Render（和原来一样）
		// ============================================================
		function onWindowResize() {
			camera.aspect = window.innerWidth / window.innerHeight;
			camera.updateProjectionMatrix();

			renderer.setSize(window.innerWidth, window.innerHeight);
			composer.setSize(window.innerWidth, window.innerHeight);
			groundReflector.getRenderTarget().setSize(window.innerWidth, window.innerHeight);
			groundReflector.resolution.set(window.innerWidth, window.innerHeight);
		}

		function animate() {
			requestAnimationFrame(animate);
			render();
		}

		function render() {
			// 每帧用 spherical 刷新相机位置
			camera.position.setFromSpherical(spherical).add(target);
			camera.lookAt(target);

			if (params.enableSSR) {
				composer.render();
			} else {
				renderer.render(scene, camera);
			}
		}
	</script>
</body>

</html>
