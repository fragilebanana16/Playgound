<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Lights lookAt cube with Volumetric Effect</title>
  <style>
    body { margin: 0; overflow: hidden; background: #111; }
    #info {
      position: absolute; top: 10px; left: 10px; color: #fff;
      font-family: sans-serif; font-size: 13px;
      background: rgba(0,0,0,0.4); padding: 8px 10px; border-radius: 4px;
    }
  </style>
</head>
<body>
<div id="info">
  Q: lights look at cube（缓慢转向）<br>
  R: 恢复原始方向（缓慢转回）<br>
  带丁达尔效果的体积光
</div>
<script type="module">
import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

let scene, camera, renderer;
let cube, plane;
let lights = [];
let mode = 'idle'; // 'idle' | 'toCube' | 'toOriginal'

init();
animate();

function init() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a0a0a);
  scene.fog = new THREE.FogExp2(0x0a0a0a, 0.02); // 添加雾效增强体积光效果

  camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.set(0, 6, 14);
  camera.lookAt(0, 0, 0);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  document.body.appendChild(renderer.domElement);

  // 地面
  const planeGeo = new THREE.PlaneGeometry(30, 30);
  const planeMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.8 });
  plane = new THREE.Mesh(planeGeo, planeMat);
  plane.rotation.x = -Math.PI / 2;
  plane.receiveShadow = true;
  scene.add(plane);

  // 中间方块
  const cubeGeo = new THREE.BoxGeometry(2, 2, 2);
  const cubeMat = new THREE.MeshStandardMaterial({ color: 0x66aaff, roughness: 0.4, metalness: 0.1 });
  cube = new THREE.Mesh(cubeGeo, cubeMat);
  cube.position.set(0, 1, 0);
  cube.castShadow = true;
  cube.receiveShadow = true;
  scene.add(cube);

  // 环境光
  const amb = new THREE.AmbientLight(0xffffff, 0.15);
  scene.add(amb);

  // 左右两排聚光灯
  createSpotRow(-8, 3, 0, 3, 0xffaa88); // 左侧
  createSpotRow( 8, 3, 0, 3, 0x88aaff); // 右侧

  window.addEventListener('resize', onWindowResize);
  window.addEventListener('keydown', onKeyDown);
}

function createSpotRow(xBase, y, zBase, count, color) {
  const spacing = 3;
  for (let i = 0; i < count; i++) {
    const spot = new THREE.SpotLight(color, 50, 40, Math.PI / 6, 0.3, 1.5);
    const x = xBase;
    const z = zBase + (i - (count - 1) / 2) * spacing;

    spot.position.set(x, y, z);
    spot.castShadow = true;
    spot.shadow.mapSize.set(1024, 1024);
    spot.shadow.camera.near = 1;
    spot.shadow.camera.far = 50;

    // 初始 target：看向场景中心附近
    const target = new THREE.Object3D();
    target.position.set(0, 0, z);
    scene.add(target);
    spot.target = target;

    // 记录原始 target 位置
    spot.userData.originalTarget = target.position.clone();

    scene.add(spot);
    lights.push(spot);

    // 创建体积光锥形网格（丁达尔效果）
    createVolumetricCone(spot, color);

    // 可视化灯光位置
    const helperGeo = new THREE.SphereGeometry(0.15, 12, 12);
    const helperMat = new THREE.MeshBasicMaterial({ color });
    const helperMesh = new THREE.Mesh(helperGeo, helperMat);
    helperMesh.position.copy(spot.position);
    scene.add(helperMesh);
  }
}

function createVolumetricCone(spotlight, color) {
  // 计算锥形参数
  const distance = spotlight.distance || 40;
  const angle = spotlight.angle;
  const radius = Math.tan(angle) * distance;
  
  // 创建锥形几何体
  const coneGeometry = new THREE.ConeGeometry(radius, distance, 32, 1, true);
  
  // 创建半透明材质，模拟光束
  const coneMaterial = new THREE.MeshBasicMaterial({
    color: color,
    transparent: true,
    opacity: 0.15,
    side: THREE.DoubleSide,
    depthWrite: false,
    blending: THREE.AdditiveBlending
  });
  
  const cone = new THREE.Mesh(coneGeometry, coneMaterial);
  
  // 调整锥形方向（默认指向-Y轴，需要旋转到-Z轴）
  cone.rotation.x = Math.PI / 2;
  cone.position.z = -distance / 2;
  
  // 将锥形添加为聚光灯的子对象，这样它会自动跟随灯光方向
  spotlight.add(cone);
  
  // 保存锥形引用，用于后续更新
  spotlight.userData.volumetricCone = cone;
}

function onKeyDown(e) {
  if (e.key === 'q' || e.key === 'Q') {
    mode = 'toCube';
  } else if (e.key === 'r' || e.key === 'R') {
    mode = 'toOriginal';
  }
}

function onWindowResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

function animate() {
  requestAnimationFrame(animate);

  // 轻微转动方块，方便看阴影变化
  cube.rotation.y += 0.01;

  updateLights();

  renderer.render(scene, camera);
}

function updateLights() {
  const lerpFactor = 0.08; // 越小越慢

  lights.forEach(light => {
    const targetPos = light.target.position;
    if (mode === 'toCube') {
      // 让 target 缓慢插值到 cube 的位置
      targetPos.lerp(cube.position, lerpFactor);
    } else if (mode === 'toOriginal') {
      // 让 target 缓慢插值回原始位置
      const orig = light.userData.originalTarget;
      targetPos.lerp(orig, lerpFactor);
    }
    
    // 更新聚光灯朝向目标
    light.lookAt(targetPos);
  });

  // 当足够接近时，可以回到 idle 状态（可选）
  if (mode === 'toCube') {
    const anyFar = lights.some(light => light.target.position.distanceTo(cube.position) > 0.05);
    if (!anyFar) mode = 'idle';
  } else if (mode === 'toOriginal') {
    const anyFar = lights.some(light => light.target.position.distanceTo(light.userData.originalTarget) > 0.05);
    if (!anyFar) mode = 'idle';
  }
}
</script>
</body>
</html>
