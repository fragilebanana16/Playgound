<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>CAR STUDIO</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; overflow:hidden; font-family:'Courier New',monospace; }
  #app { width:100vw; height:100vh; position:relative; }
  canvas { display:block; }

  #loading {
    position:fixed; inset:0; background:#000;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    z-index:100; transition:opacity .8s ease;
  }
  #loading.hidden { opacity:0; pointer-events:none; }
  #loading-title { font-size:clamp(20px,4vw,40px); letter-spacing:.4em; color:#fff; margin-bottom:6px; font-weight:200; }
  #loading-sub { font-size:10px; letter-spacing:.25em; color:#444; margin-bottom:48px; }
  #loading-bar-wrap { width:min(280px,65vw); height:1px; background:#1a1a1a; position:relative; }
  #loading-bar { height:1px; background:#fff; width:0%; transition:width .2s ease; }
  #loading-pct { position:absolute; right:0; top:8px; font-size:9px; letter-spacing:.15em; color:#444; }

  /* 上传界面：只保留 file input 按钮，不要 drop zone */
  #upload-btn {
    position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
    z-index:50; display:flex; flex-direction:column; align-items:center; gap:24px;
  }
  #upload-btn.hidden { display:none; }
  #upload-title { font-size:clamp(24px,5vw,52px); letter-spacing:.5em; color:#fff; font-weight:100; text-align:center; }
  #upload-sub { font-size:9px; letter-spacing:.3em; color:#2a2a2a; text-align:center; }

  #pick-btn {
    background:transparent; border:1px solid #2a2a2a; color:#555;
    font-family:'Courier New',monospace; font-size:9px; letter-spacing:.25em;
    padding:12px 32px; cursor:pointer; transition:all .3s; text-transform:uppercase;
  }
  #pick-btn:hover { border-color:#555; color:#999; }
  #file-input { display:none; }

  #ui { position:fixed; inset:0; pointer-events:none; z-index:10; }
  #ui.hidden { display:none; }
  #top-bar { position:absolute; top:0; left:0; right:0; padding:20px 28px; display:flex; justify-content:space-between; align-items:flex-start; }
  #model-name { font-size:10px; letter-spacing:.3em; color:#555; }
  #status-label { font-size:9px; letter-spacing:.2em; color:#2a2a2a; text-align:right; line-height:1.8; }

  #cam-bar { position:absolute; bottom:0; left:0; right:0; padding:20px; display:flex; justify-content:center; gap:6px; pointer-events:all; }
  .cam-btn {
    background:transparent; border:1px solid #1e1e1e; color:#383838;
    font-family:'Courier New',monospace; font-size:8px; letter-spacing:.2em;
    padding:7px 14px; cursor:pointer; transition:all .25s; text-transform:uppercase;
  }
  .cam-btn:hover { border-color:#444; color:#777; }
  .cam-btn.active { border-color:#666; color:#aaa; }

  /* AUTO 指示器 */
  #auto-indicator {
    position:absolute; top:20px; left:50%; transform:translateX(-50%);
    font-size:8px; letter-spacing:.3em; color:#1e2a1e;
    transition:color .6s ease; pointer-events:none;
  }
  #auto-indicator.on { color:#2a4a2a; }
  #auto-indicator::before {
    content:''; display:inline-block; width:4px; height:4px;
    border-radius:50%; background:currentColor; margin-right:6px;
    vertical-align:middle; animation:none;
  }
  #auto-indicator.on::before { animation:blink 2s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

  .corner { position:absolute; width:16px; height:16px; }
  .corner::before,.corner::after { content:''; position:absolute; background:#1a1a1a; }
  .corner::before { width:100%; height:1px; }
  .corner::after { width:1px; height:100%; }
  #c-tl{top:14px;left:14px} #c-tl::before{top:0;left:0} #c-tl::after{top:0;left:0}
  #c-tr{top:14px;right:14px} #c-tr::before{top:0;right:0} #c-tr::after{top:0;right:0}
  #c-bl{bottom:14px;left:14px} #c-bl::before{bottom:0;left:0} #c-bl::after{bottom:0;left:0}
  #c-br{bottom:14px;right:14px} #c-br::before{bottom:0;right:0} #c-br::after{bottom:0;right:0}
</style>
</head>
<body>
<div id="app">
  <div id="upload-btn">
    <div id="upload-title">CAR STUDIO</div>
    <div id="upload-sub">VEHICLE VISUALIZATION SYSTEM</div>
    <button id="pick-btn" onclick="document.getElementById('file-input').click()">SELECT GLB / GLTF</button>
    <input type="file" id="file-input" accept=".glb,.gltf">
  </div>

  <div id="loading" class="hidden">
    <div id="loading-title">LOADING</div>
    <div id="loading-sub">PROCESSING GEOMETRY</div>
    <div id="loading-bar-wrap">
      <div id="loading-bar"></div>
      <div id="loading-pct">0%</div>
    </div>
  </div>

  <div id="ui" class="hidden">
    <div class="corner" id="c-tl"></div>
    <div class="corner" id="c-tr"></div>
    <div class="corner" id="c-bl"></div>
    <div class="corner" id="c-br"></div>
    <div id="auto-indicator">AUTO ORBIT</div>
    <div id="top-bar">
      <div id="model-name">—</div>
      <div id="status-label">AUTO ORBIT<br>ACTIVE</div>
    </div>
    <div id="cam-bar">
      <button class="cam-btn" onclick="setCam(0)">FRONT</button>
      <button class="cam-btn" onclick="setCam(1)">SIDE</button>
      <button class="cam-btn" onclick="setCam(2)">REAR</button>
      <button class="cam-btn" onclick="setCam(3)">TOP</button>
      <button class="cam-btn" onclick="setCam(4)">HERO</button>
    </div>
  </div>
</div>

<script type="importmap">
{ "imports": { "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.module.js" } }
</script>

<script type="module">
import * as THREE from 'three';

const BASE = 'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/jsm/';
async function loadModule(path) {
  const res = await fetch(BASE + path);
  let src = await res.text();
  src = src.replace(/from ['"]three['"]/g, `from 'https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.module.js'`);
  const dir = BASE + path.split('/').slice(0,-1).join('/') + '/';
  src = src.replace(/from ['"]\.\//g, `from '${dir}`);
  return import(URL.createObjectURL(new Blob([src], {type:'text/javascript'})));
}

const [
  { GLTFLoader },
  { OrbitControls },
  { RectAreaLightUniformsLib },
  { Reflector },
] = await Promise.all([
  loadModule('loaders/GLTFLoader.js'),
  loadModule('controls/OrbitControls.js'),
  loadModule('lights/RectAreaLightUniformsLib.js'),
  loadModule('objects/Reflector.js'),
]);
RectAreaLightUniformsLib.init();

// ── Renderer ──────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
renderer.physicallyCorrectLights = true;
document.getElementById('app').prepend(renderer.domElement);

// ── Scene ─────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a0e);
scene.fog = new THREE.FogExp2(0x0a0a0e, 0.04);

const camera = new THREE.PerspectiveCamera(42, innerWidth/innerHeight, 0.05, 150);
camera.position.set(6, 2.5, 9);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.03;
controls.maxPolarAngle = Math.PI / 2 - 0.04;
controls.minDistance = 2;
controls.maxDistance = 18;
controls.target.set(0, 0.6, 0);
controls.update();

// ── Lights ────────────────────────────────────────────────────
const key = new THREE.RectAreaLight(0xffd090, 8, 6, 3);
key.position.set(4, 4, 6); key.lookAt(0, 0.8, 0); scene.add(key);

const fill = new THREE.RectAreaLight(0x90a8ff, 4, 4, 5);
fill.position.set(-6, 3, 1); fill.lookAt(0, 0.8, 0); scene.add(fill);

const rim = new THREE.RectAreaLight(0xff6818, 3, 8, 1.5);
rim.position.set(0, 6, -8); rim.lookAt(0, 0, 0); scene.add(rim);

const topLight = new THREE.RectAreaLight(0xffffff, 2, 6, 6);
topLight.position.set(0, 9, 0); topLight.lookAt(0, 0, 0); scene.add(topLight);

scene.add(new THREE.AmbientLight(0x101018, 3));

// ── 圆形平台 ──────────────────────────────────────────────────
const platGeo = new THREE.CylinderGeometry(5, 5.3, 0.12, 80);
const platMat = new THREE.MeshStandardMaterial({ color:0x0c0c0e, roughness:0.08, metalness:0.9 });
const platform = new THREE.Mesh(platGeo, platMat);
platform.receiveShadow = true; platform.position.y = -0.06; scene.add(platform);

const ringGeo = new THREE.TorusGeometry(5, 0.018, 8, 120);
const ringMat = new THREE.MeshBasicMaterial({ color:0x1a2030 });
const ring = new THREE.Mesh(ringGeo, ringMat);
ring.rotation.x = Math.PI / 2; ring.position.y = 0.002; scene.add(ring);

// ── Reflector ─────────────────────────────────────────────────
const reflector = new Reflector(new THREE.CircleGeometry(5, 80), {
  clipBias: 0.003,
  textureWidth: innerWidth * devicePixelRatio,
  textureHeight: innerHeight * devicePixelRatio,
  color: 0x222233,
  recursion: 1,
});
reflector.rotation.x = -Math.PI / 2;
reflector.position.y = 0.001;
scene.add(reflector);

// ── AutoOrbit ─────────────────────────────────────────────────
class AutoOrbit {
  constructor(camera, controls, target = new THREE.Vector3()) {
    this.camera = camera;
    this.controls = controls;
    this.target = target.clone();
    this.enabled = true;
    this.userInteracting = false;
    this.resumeDelay = 3000;
    this.resumeTimer = null;

    this.theta = 0;
    this.phi = Math.PI / 2.5;
    this.radius = 8;
    this.baseRadius = 8;
    this.targetTheta = 0;
    this.targetPhi = Math.PI / 2.5;
    this.targetRadius = 8;
    this.roll = 0;
    this.targetRoll = 0;
    this.baseSpeed = 0.003;
    this.time = 0;
    this.minPhi = Math.PI / 3;
    this.maxPhi = Math.PI / 2.2;

    this._bindEvents();
  }

  _bindEvents() {
    const onStart = () => {
      this.userInteracting = true;
      clearTimeout(this.resumeTimer);
      setAutoUI(false);
    };
    const onEnd = () => {
      clearTimeout(this.resumeTimer);
      this.resumeTimer = setTimeout(() => {
        this.userInteracting = false;
        this._syncFromCamera();
        setAutoUI(true);
      }, this.resumeDelay);
    };
    this.controls.addEventListener('start', onStart);
    this.controls.addEventListener('end', onEnd);
  }

  _syncFromCamera() {
    const offset = this.camera.position.clone().sub(this.target);
    this.radius = offset.length();
    this.baseRadius = this.radius;
    this.theta = Math.atan2(offset.x, offset.z);
    this.phi = Math.acos(Math.max(-1, Math.min(1, offset.y / this.radius)));
    this.phi = Math.max(this.minPhi, Math.min(this.maxPhi, this.phi));
    this.targetTheta = this.theta;
    this.targetPhi = this.phi;
    this.targetRadius = this.radius;
    this.targetRoll = 0;
  }

  setTarget(t) { this.target.copy(t); }

  setRadius(r) { this.radius = r; this.baseRadius = r; this.targetRadius = r; }

  update(dt) {
    if (!this.enabled || this.userInteracting) return;
    this.time += dt;

    const speed = this.baseSpeed + Math.sin(this.time * 0.3) * 0.001;
    this.targetTheta += speed;
    this.targetPhi += Math.sin(this.time * 0.08) * 0.002;
    this.targetPhi = Math.max(this.minPhi, Math.min(this.maxPhi, this.targetPhi));
    this.targetRadius = this.baseRadius + Math.sin(this.time * 0.12) * (this.baseRadius * 0.15);
    this.targetRoll = Math.sin(this.time * 0.05) * (Math.PI / 18); // ±10°，比原版保守

    this.theta  += (this.targetTheta  - this.theta)  * 0.05;
    this.phi    += (this.targetPhi    - this.phi)    * 0.05;
    this.radius += (this.targetRadius - this.radius) * 0.03;
    this.roll   += (this.targetRoll   - this.roll)   * 0.02;

    const sinPhi = Math.sin(this.phi), cosPhi = Math.cos(this.phi);
    const x = this.target.x + this.radius * sinPhi * Math.sin(this.theta);
    const y = this.target.y + this.radius * cosPhi;
    const z = this.target.z + this.radius * sinPhi * Math.cos(this.theta);

    this.camera.position.lerp(new THREE.Vector3(x, y, z), 0.05);

    const forward = new THREE.Vector3().subVectors(this.target, this.camera.position).normalize();
    const right   = new THREE.Vector3().crossVectors(forward, new THREE.Vector3(0,1,0)).normalize();
    const baseUp  = new THREE.Vector3().crossVectors(right, forward).normalize();
    const rollQ   = new THREE.Quaternion().setFromAxisAngle(forward, this.roll);
    this.camera.up.copy(baseUp.clone().applyQuaternion(rollQ));
    this.camera.lookAt(this.target);
    this.controls.target.copy(this.target);
    this.controls.update();
  }

  dispose() { clearTimeout(this.resumeTimer); }
}

// ── 相机预设 ──────────────────────────────────────────────────
const camDefs = [
  { r:2.2, phi:16, theta:2,   ty:0.35, label:'CAM 01\nFRONT' },
  { r:2.2, phi:13, theta:90,  ty:0.30, label:'CAM 02\nSIDE'  },
  { r:2.2, phi:16, theta:180, ty:0.35, label:'CAM 03\nREAR'  },
  { r:1.8, phi:68, theta:25,  ty:0.15, label:'CAM 04\nTOP'   },
  { r:1.5, phi:22, theta:40,  ty:0.25, label:'CAM 05\nHERO'  },
];
let modelScale = 3;
let autoOrbit = null;
let camAnim = null;

function defToWorld(d) {
  const ph = THREE.MathUtils.degToRad(d.phi);
  const th = THREE.MathUtils.degToRad(d.theta);
  const r  = d.r * modelScale;
  return {
    pos:    new THREE.Vector3(r*Math.cos(ph)*Math.sin(th), r*Math.sin(ph), r*Math.cos(ph)*Math.cos(th)),
    target: new THREE.Vector3(0, d.ty * modelScale, 0),
  };
}

function quatFromLookAt(pos, target) {
  const m = new THREE.Matrix4().lookAt(pos, target, new THREE.Vector3(0,1,0));
  return new THREE.Quaternion().setFromRotationMatrix(m);
}

function easeInOutCubic(t) {
  return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2;
}

// setCam 会暂停自动转，3s后如果没有手动交互再恢复
window.setCam = (idx) => {
  document.querySelectorAll('.cam-btn').forEach((b,i) => b.classList.toggle('active', i===idx));
  const w = defToWorld(camDefs[idx]);

  // 临时停掉 autoOrbit
  if (autoOrbit) autoOrbit.userInteracting = true;
  setAutoUI(false);

  camAnim = {
    fromPos:    camera.position.clone(),
    toPos:      w.pos,
    fromQ:      camera.quaternion.clone(),
    toQ:        quatFromLookAt(w.pos, w.target),
    fromTarget: controls.target.clone(),
    toTarget:   w.target,
    t: 0,
    onDone: () => {
      // 动画完成后，同步 autoOrbit 状态再恢复
      if (autoOrbit) {
        autoOrbit._syncFromCamera();
        autoOrbit.userInteracting = false;
        setAutoUI(true);
      }
    }
  };
};

// ── UI 状态 ───────────────────────────────────────────────────
function setAutoUI(on) {
  const ind = document.getElementById('auto-indicator');
  const lbl = document.getElementById('status-label');
  if (on) {
    ind.classList.add('on');
    lbl.textContent = 'AUTO ORBIT\nACTIVE';
    lbl.style.color = '#2a4a2a';
  } else {
    ind.classList.remove('on');
    lbl.textContent = 'MANUAL\nCONTROL';
    lbl.style.color = '#2a2a2a';
  }
}

// ── 模型加载 ──────────────────────────────────────────────────
let carModel = null;
const loader = new GLTFLoader();

function loadModel(url, name) {
  document.getElementById('upload-btn').classList.add('hidden');
  const loadEl = document.getElementById('loading');
  loadEl.classList.remove('hidden');

  loader.load(url, gltf => {
    if (carModel) {
      carModel.traverse(o => { if (o.isMesh) { o.geometry.dispose(); o.material.dispose(); } });
      scene.remove(carModel);
    }
    carModel = gltf.scene;

    const box    = new THREE.Box3().setFromObject(carModel);
    const size   = box.getSize(new THREE.Vector3());
    const center = box.getCenter(new THREE.Vector3());
    const maxD   = Math.max(size.x, size.y, size.z);
    const s      = 3 / maxD;

    carModel.scale.setScalar(s);
    carModel.position.x = -center.x * s;
    carModel.position.z = -center.z * s;
    carModel.position.y = -box.min.y * s;

    // modelScale 用模型最大轴长（缩放后=3）作半径基准
    modelScale = 3;

    carModel.traverse(o => {
      if (o.isMesh) {
        o.castShadow = true;
        o.receiveShadow = true;
        if (o.material) o.material.envMapIntensity = 1.0;
      }
    });
    scene.add(carModel);

    document.getElementById('model-name').textContent = name.replace(/\.[^.]+$/,'').toUpperCase();
    loadEl.classList.add('hidden');
    document.getElementById('ui').classList.remove('hidden');

    // 初始化 autoOrbit，target 在车的中心高度
    const carHeight = size.y * s;
    const orbitTarget = new THREE.Vector3(0, carHeight * 0.45, 0);
    controls.target.copy(orbitTarget);

    if (autoOrbit) autoOrbit.dispose();
    autoOrbit = new AutoOrbit(camera, controls, orbitTarget);
    autoOrbit.setRadius(modelScale * 2.2);
    autoOrbit._syncFromCamera();

    setAutoUI(true);
  }, prog => {
    const p = prog.total ? Math.round(prog.loaded/prog.total*100) : 0;
    document.getElementById('loading-bar').style.width = p + '%';
    document.getElementById('loading-pct').textContent = p + '%';
  }, err => {
    console.error(err);
    loadEl.classList.add('hidden');
    document.getElementById('upload-btn').classList.remove('hidden');
  });
}

document.getElementById('file-input').addEventListener('change', e => {
  const f = e.target.files[0]; if (f) loadModel(URL.createObjectURL(f), f.name);
});

// ── Render loop ───────────────────────────────────────────────
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 1/30);

  if (camAnim) {
    camAnim.t += dt * 1.1;
    const t  = Math.min(camAnim.t, 1);
    const et = easeInOutCubic(t);
    camera.position.lerpVectors(camAnim.fromPos, camAnim.toPos, et);
    THREE.Quaternion.slerp(camAnim.fromQ, camAnim.toQ, camera.quaternion, et);
    controls.target.lerpVectors(camAnim.fromTarget, camAnim.toTarget, et);
    if (t >= 1) {
      if (camAnim.onDone) camAnim.onDone();
      camAnim = null;
    }
  } else if (autoOrbit) {
    autoOrbit.update(dt);
  } else {
    controls.update();
  }

  renderer.render(scene, camera);
}

animate();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
