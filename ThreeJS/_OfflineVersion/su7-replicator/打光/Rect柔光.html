<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js Area Light Scene with File Upload</title>
    <style>
        canvas { display: block; }
        #fileInput { position: absolute; top: 10px; left: 10px; z-index: 100; }
        #glbInput  { position: absolute; top: 10px; left: 160px; z-index: 100; }
    </style>
	<link rel="stylesheet" href="./style.css">
</head>
<body>
    <input type="file" id="fileInput" accept=".exr" />
	<input type="file" id="glbInput" accept=".glb,.gltf" />
	<script src="../../../../../JQuery/jquery-3.7.1.min.js" type="text/javascript"></script>
    <script src="../../libs/three.min.js"></script>
    <script src="../../libs/DecalGeometry.js"></script>
    <script src="../../libs/OrbitControls.js"></script>
    <script src="../../libs/EXRLoader.js"></script>
	<script src="../../libs/GLTFLoader.js"></script>
    <script src="../../libs/lights/RectAreaLightUniformsLib.js"></script>
    <script src="../../libs/helpers/RectAreaLightHelper.js"></script>
    <script src="../../libs/dat.gui.min.js"></script>
    <script src="./js/userInterface.js"></script>
    <script src="./js/decalManager.js"></script>
    <script>
	    const SceneManager = (() => {
            let mActiveModel = null;
            let mTestObject = null;
			let starNestMaterial = null;
			let mAmbientLight = null;
			
			const getActiveModel = () => {
			    return mActiveModel && mActiveModel.getObjectByName("Obj_Side_Doors").children[3];
			}
            const loader = new THREE.GLTFLoader();
			const addTestObject = (scene) => {
				if (mTestObject) {
					scene.remove(mTestObject);
					mTestObject.traverse((child) => {
						if (child.isMesh) {
							child.geometry.dispose();
							if (Array.isArray(child.material)) {
								child.material.forEach(mat => mat.dispose());
							} else {
								child.material.dispose();
							}
						}
					});
					mTestObject = null;
				}

				const geo = new THREE.BoxGeometry(1, 1, 1);
				const mat = new THREE.MeshStandardMaterial({
					color: 0xffffff,
					metalness: 0.1,
					roughness: 0.2
				});

				const cube = new THREE.Mesh(geo, mat);
				cube.name = "添加测试物体";
				cube.scale.set(10, 10, 10);
				cube.position.set(0, 6, 0);
				mTestObject = cube;
				scene.add(cube);
				return cube;
			};
			
			const addAmbientLight = (scene) => {
				if (mAmbientLight) {
					scene.remove(mAmbientLight);
					mAmbientLight = null;
				}

				const amb = new THREE.AmbientLight(0xffffff, 0.05); 
				amb.name = "环境光";
				mAmbientLight = amb;
				scene.add(amb);
			};

			const loadActiveModel = (scene, file = null, finCb = null) => {
			    if (mActiveModel) {
			        scene.remove(mActiveModel);
			        mActiveModel.traverse((child) => {
			            if (child.isMesh) {
			                child.geometry.dispose();
			                if (Array.isArray(child.material)) {
			                    child.material.forEach(mat => mat.dispose());
			                } else {
			                    child.material.dispose();
			                }
			            }
			        });
			        mActiveModel = null;
			    }

			    if (file) {
			        const url = URL.createObjectURL(file);
			        loader.load(url, (gltf) => {
			            mActiveModel = gltf.scene;
			            // mActiveModel.scale.set(6, 6, 6);
			            scene.add(mActiveModel);
			            URL.revokeObjectURL(url); // 用完释放
						finCb && finCb();
			        }, undefined, (err) => {
			            console.error('加载用户文件失败:', err);
			        });
			    } else {
			        loader.load('model.glb', (gltf) => {
			            mActiveModel = gltf.scene;
			            scene.add(mActiveModel);
						finCb && finCb();
			        }, undefined, (err) => {
			            console.error('加载默认模型失败:', err);
			        });
			    }

			};
			
		    const setEntityColor = (targetMat, webColor) => {
				mActiveModel && mActiveModel.traverse(obj => {
					if (obj instanceof THREE.Mesh) {
						if (obj.material.name.startsWith(targetMat) || obj.material.name === 'Mt_MirrorCover' || obj.material.name === 'CustomTexture') {
						    const hex = parseInt(webColor.replace("#", "0x"));
							obj.material.color = new THREE.Color(hex).convertSRGBToLinear();
						}
					}
				});
			}
			const attachOverlay =  (obj, texture1) => {
			    const overlay = obj.parent.getObjectByName(obj.name + "_overlay");
				if(overlay) {
				    overlay.material.map = texture1;
					return;
				}
				
				const mat = new THREE.MeshBasicMaterial({
					map: texture1,
					transparent: true,
					blending: THREE.NormalBlending,
				});
				mat.needsUpdate = true;

				const clone = obj.clone();
				clone.material = mat;

				clone.position.copy(obj.position);
				clone.rotation.copy(obj.rotation);
				clone.scale.copy(obj.scale);
                clone.scale.multiplyScalar(1.001);

				clone.name = obj.name + "_overlay";

				obj.parent.add(clone);
				return clone;
			}

            const setEntityTexture = (targetMat, texture) => {

                mActiveModel && mActiveModel.traverse(obj => {
                    if (obj instanceof THREE.Mesh) {
                        if (obj.material.name.startsWith(targetMat)) {

                            const loader = new THREE.TextureLoader();
                            const loadTexture = (url) => {
                                return new Promise((resolve, reject) => {
                                    loader.load(
                                        url,
                                        (texture) => resolve(texture),
                                        undefined,
                                        (error) => reject(error));
                                });
                            };

                            // 加载多个纹理
                            Promise.all([
                                    loadTexture('assets/' + texture + '.png'),
                                ]).then(([texture1]) => {
                                console.log('所有纹理加载完成');
                                texture1.flipY = false;
                                texture1.encoding = THREE.sRGBEncoding;
								texture.wrapS = THREE.ClampToEdgeWrapping; // 超过 0~1 就裁剪
                                texture.wrapT = THREE.ClampToEdgeWrapping;
                                attachOverlay(obj, texture1);
                            }).catch((error) => {
                                console.error('纹理加载失败:', error);
                            });
                        }
                    }
                });
            }
			
		    const setCustomShader = (targetMat) => {
		        if (starNestMaterial === null) {
		            starNestMaterial = new THREE.ShaderMaterial({
		                uniforms: {
		                    iTime: {
		                        value: 0
		                    },
		                    iResolution: {
		                        value: new THREE.Vector3(window.innerWidth, window.innerHeight, 1)
		                    }
		                },
		                vertexShader: `
				varying vec2 vUv;
				void main() {
				  vUv = uv;
				  gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
				}
			  `,
		                fragmentShader: `
					uniform vec2 iResolution;
					uniform float iTime;
					varying vec2 vUv;

					void main() {
						vec2 u = gl_FragCoord.xy;
						vec2 v = iResolution.xy;
						u = .2*(u+u-v)/v.y;    

						vec4 o = vec4(1,2,3,0);
						vec4 z = o;

						for (float a = .5, t = iTime, i; ++i < 19.; ) {
							o += (1. + cos(z+t)) 
							   / length((1.+i*dot(v,v)) 
									  * sin(1.5*u/(.5-dot(u,u)) - 9.*u.yx + t));
							v = cos(++t - 7.*u*pow(a += .03, i)) - 5.*u;
							u += tanh(40. * dot(u *= mat2(cos(i + .02*t - z.wxzw*11.)), u)
									  * cos(1e2*u.yx + t)) / 2e2
							   + .2 * a * u
							   + cos(4./exp(dot(o,o)/1e2) + t) / 3e2;
						}

						o = 25.6 / (min(o, 13.) + 164. / o) 
						  - dot(u, u) / 250.;

						gl_FragColor = o;
					}
			  `
		            });
		        }
				mActiveModel && mActiveModel.traverse(obj => {
					if (obj instanceof THREE.Mesh) {
						if (obj.material.name.startsWith(targetMat) || obj.material.name === 'CustomTexture') {
							// 保留原来的材质
							const originalMaterial = obj.material;

							// 创建一个新的 Mesh，使用相同几何体
							const overlayMesh = new THREE.Mesh(obj.geometry, starNestMaterial);

							// 让它透明并叠加
							starNestMaterial.transparent = true;
							starNestMaterial.blending = THREE.AdditiveBlending;

							// 保证位置和旋转一致
							overlayMesh.position.copy(obj.position);
							overlayMesh.rotation.copy(obj.rotation);
							overlayMesh.scale.copy(obj.scale);
							overlayMesh.scale.multiplyScalar(1.001); // 稍微放大一点点

							// 把 overlayMesh 加到同一个父节点
							obj.parent.add(overlayMesh);
						}
					}
				});
		    }

			const animate = (t) => {
			  requestAnimationFrame(animate);
			  if (controls) controls.update();
			  if (starNestMaterial) {
				starNestMaterial.uniforms.iTime.value = t / 1000; // 用 rAF 的时间戳
			  }
			  renderer.render(scene, camera);
			};
			
            return { animate, loadActiveModel, setEntityColor, setCustomShader, setEntityTexture, addTestObject, addAmbientLight, getActiveModel }
		})();
		
		
		
		UserInterface.initialize();
        UserInterface.setOnEntityColor(SceneManager.setEntityColor);
		UserInterface.setOnCustomShader(SceneManager.setCustomShader)
		UserInterface.setOnEntityTexture(SceneManager.setEntityTexture)
		let timeStamp = null;
        // Constants
        const IS_DEBUG = true;
        const SCENE_COLOR = 0x000000;
        const LIGHT_SIZE = new THREE.Vector2(12, 6);
        const LIGHT_INTENSITY = 8;
        const LIGHT_COLOR = 0xffffff;
        const LIGHT_POS_LEFT = new THREE.Vector2(0, 16, -18);
        const LIGHT_ROT_LEFT = new THREE.Euler(-135 * Math.PI / 180, 0, -180 * Math.PI / 180);
        const LIGHT_POS_RIGHT = new THREE.Vector2(0, 16, 18);
        const LIGHT_ROT_RIGHT = new THREE.Euler(-45 * Math.PI / 180, 0, 0);

        // Helper function to create area light
        function createAreaLight(color, intensity, size, visible) {
            const rectLight = new THREE.RectAreaLight(color, intensity, size.x, size.y);
            if (visible) {
                const rectHelper = new THREE.RectAreaLightHelper(rectLight, 0xffffff);
                rectLight.add(rectHelper);
            }
            return rectLight;
        }

        // Initialize Three.js scene
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(SCENE_COLOR);
        scene.fog = new THREE.Fog(SCENE_COLOR, 30, 100);
		
		// 默认添加
        SceneManager.loadActiveModel(scene);
        //const testObj = SceneManager.addTestObject(scene);
        //SceneManager.addAmbientLight(scene);
		
        // Initialize renderer
        const renderer = new THREE.WebGLRenderer({
            antialias: true
        });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0;
        renderer.outputEncoding = THREE.sRGBEncoding;
        document.body.appendChild(renderer.domElement);

        // Initialize camera
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 10, 30);
        camera.lookAt(0, 0, 0);

        // Add orbit controls
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
		
		// 贴花
        let decalManager = new DecalManager(scene, camera, renderer.domElement, {
            minScale: 2,
            maxScale: 4,
            rotate: true,
            decalDiffuseUrl: 'textures/decal/decal-diffuse.png',
            decalNormalUrl: 'textures/decal/decal-normal.jpg'
        });
        // decalManager.setTargetMesh(testObj);
			
        // Initialize RectAreaLightUniformsLib
        THREE.RectAreaLightUniformsLib.init();

        // Add area lights
        const leftLight = createAreaLight(LIGHT_COLOR, LIGHT_INTENSITY, LIGHT_SIZE, IS_DEBUG);
        leftLight.position.set(LIGHT_POS_LEFT.x, LIGHT_POS_LEFT.y, -18);
        leftLight.rotation.copy(LIGHT_ROT_LEFT);
        scene.add(leftLight);

        const rightLight = createAreaLight(LIGHT_COLOR, LIGHT_INTENSITY, LIGHT_SIZE, IS_DEBUG);
        rightLight.position.set(LIGHT_POS_RIGHT.x, LIGHT_POS_RIGHT.y, 18);
        rightLight.rotation.copy(LIGHT_ROT_RIGHT);
        scene.add(rightLight);

        // Add a simple ground plane for visualization
        const groundGeometry = new THREE.PlaneGeometry(50, 50);
        const groundMaterial = new THREE.MeshStandardMaterial({
            color: 0x808080,
            roughness: 0.8,
            metalness: 0.2
        });
        const ground = new THREE.Mesh(groundGeometry, groundMaterial);
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        // Add a test sphere for PBR visualization
        const sphereGeometry = new THREE.SphereGeometry(5, 16, 16);
        const sphereMaterial = new THREE.MeshStandardMaterial({
            color: 0xffffff,
            roughness: 0,
            metalness: 0
        });
        const sphere = new THREE.Mesh(sphereGeometry, sphereMaterial);
        sphere.position.y = 24;
        scene.add(sphere);
        // GLB 上传处理
        const glbInput = document.getElementById('glbInput');
        glbInput.addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (!file) {
                console.log("No GLB file selected.");
                return;
            }

            if (file) {
                SceneManager.loadActiveModel(scene, file, () => {
				    decalManager.setTargetMesh(SceneManager.getActiveModel());
				});
            }
        });

        // File input handler
        const fileInput = document.getElementById('fileInput');
        fileInput.addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (!file) {
                console.log("No file selected.");
                return;
            }

            const fileURL = URL.createObjectURL(file);
            const exrLoader = new THREE.EXRLoader();
            const pmremGenerator = new THREE.PMREMGenerator(renderer);

            exrLoader.load(
                fileURL,
                (texture) => {
                console.log("EXR file loaded successfully.");
                const envMap = pmremGenerator.fromEquirectangular(texture).texture;
                scene.environment = envMap;
                texture.dispose();
                pmremGenerator.dispose();
                console.log("Environment map applied.");
                URL.revokeObjectURL(fileURL); // 释放 Blob URL
            },
                undefined,
                (error) => {
                console.error("Error loading EXR file:", error);
                URL.revokeObjectURL(fileURL); // 释放 Blob URL
            });
        });

        // GUI
        const gui = new dat.GUI();

        function setupLightGUI(light, name) {
            const folder = gui.addFolder(name);

            // 位置
            const pos = folder.addFolder("Position");
            pos.add(light.position, "x", -50, 50, 0.1);
            pos.add(light.position, "y", -50, 50, 0.1);
            pos.add(light.position, "z", -50, 50, 0.1);

            // 旋转
            const rot = folder.addFolder("Rotation");
            rot.add(light.rotation, "x", -Math.PI, Math.PI, 0.01);
            rot.add(light.rotation, "y", -Math.PI, Math.PI, 0.01);
            rot.add(light.rotation, "z", -Math.PI, Math.PI, 0.01);

            // 强度
            folder.add(light, "intensity", 0, 50, 0.1);

            // 尺寸
            const size = {
                width: light.width,
                height: light.height
            };
            folder.add(size, "width", 0.1, 50, 0.1).onChange(v => light.width = v);
            folder.add(size, "height", 0.1, 50, 0.1).onChange(v => light.height = v);

            folder.open();
        }

        setupLightGUI(leftLight, "Left Light");
        setupLightGUI(rightLight, "Right Light");

        SceneManager.animate(renderer, scene, camera, controls);
		
        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
