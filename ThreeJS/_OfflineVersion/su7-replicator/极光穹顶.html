<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Aurora Dome</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; }
  canvas { display: block; }
  #hint {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    color: rgba(150,180,255,0.45); font: 13px/1 'Courier New', monospace;
    letter-spacing: 0.15em; pointer-events: none;
  }
</style>

<body>
<input id="modelInput" type="file" accept=".glb,.gltf" style="position: absolute; z-index: 10;">
<div id="hint">MOVE MOUSE TO LOOK AROUND</div>
    <script src="../libs/three.js"></script>
    <script src="../libs/OrbitControls.js"></script>
	<script src="../libs/dat.gui.min.js"></script>

    <script src="../libs/GLTFLoader.js"></script>
    <script src="../libs/RGBELoader.js"></script>

<script>

// ─── Renderer ───────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
// 线性雾：近处清晰，远处完全被雾覆盖
scene.fog = new THREE.FogExp2(0x0a1a2e, 0.1); // 比 0.008 更浓


// 第一个参数是雾的颜色（和背景色保持一致），第二个是密度，越大雾越浓
const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 1000);
camera.position.set(0, 1.5, 5);
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.target.set(0, 1.05, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.05;

const loader = new THREE.GLTFLoader();


function loadHDRI(renderer, path) {
  return new Promise((resolve) => {
    const pmremGenerator = new THREE.PMREMGenerator(renderer);
    pmremGenerator.compileEquirectangularShader();

    new THREE.RGBELoader().load(path, (texture) => {
      const hdriMap = pmremGenerator.fromEquirectangular(texture).texture;
      texture.dispose();
      pmremGenerator.dispose();
      resolve(hdriMap);
    });
  });
}





async function  loadModel(url, options = { useEnvMap: false, scale: 1, position: { x:0, y:2, z:0 }, hdriMap: null }) {
  return new Promise((resolve, reject) => {
    loader.load(url, (gltf) => {
      const model = gltf.scene;
      model.scale.set(options.scale, options.scale, options.scale);
      model.position.set(options.position.x, options.position.y, options.position.z);
      model.traverse((obj) => {
        if (obj.isMesh && obj.material) {
          const materials = Array.isArray(obj.material) ? obj.material : [obj.material];
          materials.forEach(mat => {

            if (options.useEnvMap) {
              mat.envMap = cubeRT.texture;
              mat.envMapIntensity = 2.5;
              mat.roughness = 0.5;
              mat.metalness = 0.5;

            }
             else if (options.hdriMap) {
              mat.envMap = options.hdriMap;
             }
            mat.needsUpdate = true;
          });
        }
      });


      // 返回模型对象
      resolve(model);
    }, undefined, reject);
  });
}
const helpers = [];
// 使用 async/await
async function initScene() {
  const hdriMap = await loadHDRI(renderer, 'G:/3dmodels/hdr/WinterForest.hdr');
  debugger
  const bridge = await loadModel('../models/bridges/roadbridge.glb', { useEnvMap: true, scale: 0.04, position: { x:0, y:0, z:0 } } );
  scene.add(bridge);
}

initScene();
// 创建 dat.GUI
const gui = new dat.GUI();


//loadModel("../models/carWheel_carBody.glb", { useEnvMap: false, scale: 0.1, position: { x:0, y:2, z:0 } });


const hemi = new THREE.HemisphereLight(
  0x003322,  // skyColor：深绿黑，模拟极光天空反射
  0x001122,  // groundColor：深蓝紫，雪地阴影面的冷色
  0.6        // intensity 不要太强，夜晚嘛
);
const ambient = new THREE.AmbientLight(0x001a0f, 0.3);

scene.add(hemi);
scene.add(ambient);


// HemisphereLight 控制
const hemiFolder = gui.addFolder('Hemisphere Light');
hemiFolder.addColor({ sky: hemi.color.getHex() }, 'sky')
  .onChange(v => hemi.color.set(v));
hemiFolder.addColor({ ground: hemi.groundColor.getHex() }, 'ground')
  .onChange(v => hemi.groundColor.set(v));
hemiFolder.add(hemi, 'intensity', 0, 2, 0.01);

// AmbientLight 控制
const ambientFolder = gui.addFolder('Ambient Light');
ambientFolder.addColor({ color: ambient.color.getHex() }, 'color')
  .onChange(v => ambient.color.set(v));
ambientFolder.add(ambient, 'intensity', 0, 2, 0.01);

// ─── Aurora Sky Shader ──────────────────────────────────────────────────────
const skyVert = /* glsl */`
varying vec3 vDir;
void main() {
  vDir = normalize((modelMatrix * vec4(position, 0.0)).xyz);
  gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
}`;

const skyFrag = /* glsl */`
    precision highp float;
    uniform float iTime;
    uniform vec2  iResolution;
    varying vec3  vDir;

    mat2 mm2(in float a){ float c=cos(a),s=sin(a); return mat2(c,s,-s,c); }
    const mat2 m2 = mat2(0.95534,0.29552,-0.29552,0.95534);

    float tri(in float x){ return clamp(abs(fract(x)-.5),0.01,0.49); }
    vec2 tri2(in vec2 p){ return vec2(tri(p.x)+tri(p.y), tri(p.y+tri(p.x))); }

    float triNoise2d(in vec2 p, float spd){
      float z=1.8, z2=2.5, rz=0.;
      p *= mm2(p.x*0.06);
      vec2 bp = p;
      for(float i=0.;i<5.;i++){
        vec2 dg = tri2(bp*1.85)*.75;
        dg *= mm2(iTime*spd);
        p -= dg/z2;
        bp *= 1.3; z2 *= .45; z *= .42;
        p *= 1.21+(rz-1.0)*.02;
        rz += tri(p.x+tri(p.y))*z;
        p *= -m2;
      }
      return clamp(1./pow(rz*29.,1.3),0.,.55);
    }

    float hash21(in vec2 n){ return fract(sin(dot(n,vec2(12.9898,4.1414)))*43758.5453); }

    vec4 aurora(vec3 ro, vec3 rd){
      vec4 col=vec4(0.), avgCol=vec4(0.);
      for(float i=0.;i<8.;i++){
        float of = 0.006*hash21(vec2(i*13.71, i*7.33))*smoothstep(0.,15.,i);
        float pt = ((.8+pow(i,1.4)*.002)-ro.y)/(rd.y*2.+0.4);
        pt -= of;
        vec3 bpos = ro+pt*rd;
        vec2 p = bpos.zx;
        float rzt = triNoise2d(p, 0.6);
        vec4 col2 = vec4(0.,0.,0.,rzt);
        // 颜色会随时间循环滚动
        col2.rgb = (sin(1.0 - vec3(2.15, -.5, 1.2) + i*0.043) * 0.5 + 0.5) * rzt;
        avgCol = mix(avgCol, col2, .5);
        col += avgCol*exp2(-i*0.065-2.5)*smoothstep(0.,5.,i);
      }
      col *= clamp(rd.y*15.+.4,0.,1.);
      return col*1.8;
    }

    vec3 nmzHash33(vec3 q){
      uvec3 p = uvec3(ivec3(q));
      p = p*uvec3(374761393u,1103515245u,668265263u)+p.zxy+p.yzx;
      p = p.yzx*(p.zxy^(p>>3u));
      return vec3(p^(p>>16u))*(1.0/float(0xffffffffu));
    }

    vec3 stars(in vec3 p){
      vec3 c = vec3(0.);
      float res = iResolution.x;
      for(float i=0.;i<4.;i++){
        vec3 q = fract(p*(.15*res))-.5;
        vec3 id = floor(p*(.15*res));
        vec2 rn = nmzHash33(id).xy;
        float c2 = 1.-smoothstep(0.,.6,length(q));
        c2 *= step(rn.x,.0005+i*i*0.001);
        c += c2*(mix(vec3(1.0,0.49,0.1),vec3(0.75,0.9,1.),rn.y)*0.1+0.9);
        p *= 1.3;
      }
      return c*c*.8;
    }

    vec3 bg(in vec3 rd){
      float sd = dot(normalize(vec3(-0.5,-0.6,0.9)),rd)*0.5+0.5;
      sd = pow(sd,5.);
      return mix(vec3(0.05,0.1,0.2),vec3(0.1,0.05,0.2),sd)*.63;
    }

    void main(){
      vec3 ro = vec3(0.,0.,-6.7);
      vec3 rd = normalize(vDir);
      float fade = smoothstep(0.,0.01,abs(rd.y))*0.1+0.9;
      vec3 col = bg(rd)*fade;
      if(rd.y > 0.){
        vec4 aur = smoothstep(0.,1.5,aurora(ro,rd))*fade;
        col += stars(rd);
        col = col*(1.-aur.a)+aur.rgb;
      } else {
        vec3 rrd = vec3(rd.x, abs(rd.y), rd.z);
        col = bg(rrd)*fade*0.6;
        vec4 aur = smoothstep(0.,2.5,aurora(ro,rrd));
        col += stars(rrd)*0.1;
        col = col*(1.-aur.a)+aur.rgb;
        vec3 pos = ro+((0.5-ro.y)/rrd.y)*rrd;
        float nz2 = triNoise2d(pos.xz*vec2(.5,.7),0.);
        col += mix(vec3(0.2,0.25,0.5)*0.08,vec3(0.3,0.3,0.5)*0.7,nz2*0.4);
      }
      gl_FragColor = vec4(col,1.0);
}`;

const skyMat = new THREE.ShaderMaterial({
  vertexShader: skyVert,
  fragmentShader: skyFrag,
  uniforms: {
    iTime:       { value: 0 },
    iResolution: { value: new THREE.Vector2(innerWidth, innerHeight) }
  },
  side: THREE.BackSide,
  depthWrite: false
});
const sky = new THREE.Mesh(new THREE.SphereGeometry(200, 64, 32), skyMat);
scene.add(sky);

// ─── CubeCamera for live reflections ────────────────────────────────────────
const cubeRT = new THREE.WebGLCubeRenderTarget(256, {
  format: THREE.RGBAFormat,
  generateMipmaps: true,
  minFilter: THREE.LinearMipmapLinearFilter,
  encoding: THREE.sRGBEncoding
});
const cubeCamera = new THREE.CubeCamera(0.1, 500, cubeRT);
scene.add(cubeCamera);

// ─── Reflective sphere ───────────────────────────────────────────────────────
const sphereMat = new THREE.MeshStandardMaterial({
  metalness: 1.0,
  roughness: 0.04,
  envMap: cubeRT.texture,
  envMapIntensity: 2.0,
  color: new THREE.Color(0.75, 0.85, 1.0)
});
const sphere = new THREE.Mesh(new THREE.SphereGeometry(1.0, 128, 64), sphereMat);
sphere.position.set(0, 1.05, 0);
//scene.add(sphere);

// ─── Mirror ground ───────────────────────────────────────────────────────────



// Small ambient so PBR doesn't go fully black
scene.add(new THREE.AmbientLight(0x223355, 0.4));


// ─── Resize ──────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  skyMat.uniforms.iResolution.value.set(innerWidth, innerHeight);
});

// ─── Loop ────────────────────────────────────────────────────────────────────
const clock = new THREE.Clock();
let frameCount = 0;
function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  skyMat.uniforms.iTime.value = t;

helpers.forEach(h => h.update());


  sphere.rotation.y = t * 0.15;
controls.update();
  // Render env map without the sphere itself
  
    frameCount++;
  if (frameCount % 3 === 0) {
    sphere.visible = false;
  cubeCamera.position.copy(sphere.position);
    cubeCamera.update(renderer, scene);
    sphere.visible = true;
  }


  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
