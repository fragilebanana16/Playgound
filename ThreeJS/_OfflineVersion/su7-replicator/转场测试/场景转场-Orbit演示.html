<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js 场景转场效果</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        canvas {
            display: block;
        }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 5px;
            font-size: 14px;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            margin: 0 5px;
        }
        button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>
    <div id="info">
        点击按钮触发转场效果<br>
        转场完成后可使用鼠标控制视角
    </div>
    <div id="controls">
        <button id="transitionBtn">开始转场</button>
    </div>

    <script src="https://unpkg.com/three@0.158.0/build/three.min.js"></script>
    <script src="https://unpkg.com/dat.gui@0.7.9/build/dat.gui.min.js"></script>

    <script>
        // OrbitControls 内嵌代码
        THREE.OrbitControls = function ( object, domElement ) {
            this.object = object;
            this.domElement = ( domElement !== undefined ) ? domElement : document;
            
            this.enabled = true;
            this.target = new THREE.Vector3();
            
            this.minDistance = 0;
            this.maxDistance = Infinity;
            
            this.minZoom = 0;
            this.maxZoom = Infinity;
            
            this.minPolarAngle = 0;
            this.maxPolarAngle = Math.PI;
            
            this.minAzimuthAngle = - Infinity;
            this.maxAzimuthAngle = Infinity;
            
            this.enableDamping = false;
            this.dampingFactor = 0.05;
            
            this.enableZoom = true;
            this.zoomSpeed = 1.0;
            
            this.enableRotate = true;
            this.rotateSpeed = 1.0;
            
            this.enablePan = true;
            this.panSpeed = 1.0;
            this.screenSpacePanning = true;
            this.keyPanSpeed = 7.0;
            
            this.autoRotate = false;
            this.autoRotateSpeed = 2.0;
            
            this.enableKeys = true;
            this.keys = { LEFT: 37, UP: 38, RIGHT: 39, BOTTOM: 40 };
            this.mouseButtons = { LEFT: THREE.MOUSE.ROTATE, MIDDLE: THREE.MOUSE.DOLLY, RIGHT: THREE.MOUSE.PAN };
            this.touches = { ONE: THREE.TOUCH.ROTATE, TWO: THREE.TOUCH.DOLLY_PAN };
            
            this.target0 = this.target.clone();
            this.position0 = this.object.position.clone();
            this.zoom0 = this.object.zoom;
            
            var scope = this;
            var changeEvent = { type: 'change' };
            var startEvent = { type: 'start' };
            var endEvent = { type: 'end' };
            
            var STATE = {
                NONE: - 1,
                ROTATE: 0,
                DOLLY: 1,
                PAN: 2,
                TOUCH_ROTATE: 3,
                TOUCH_PAN: 4,
                TOUCH_DOLLY_PAN: 5,
                TOUCH_DOLLY_ROTATE: 6
            };
            
            var state = STATE.NONE;
            var EPS = 0.000001;
            
            var spherical = new THREE.Spherical();
            var sphericalDelta = new THREE.Spherical();
            var scale = 1;
            var panOffset = new THREE.Vector3();
            var zoomChanged = false;
            
            var rotateStart = new THREE.Vector2();
            var rotateEnd = new THREE.Vector2();
            var rotateDelta = new THREE.Vector2();
            
            var panStart = new THREE.Vector2();
            var panEnd = new THREE.Vector2();
            var panDelta = new THREE.Vector2();
            
            var dollyStart = new THREE.Vector2();
            var dollyEnd = new THREE.Vector2();
            var dollyDelta = new THREE.Vector2();
            
            function getAutoRotationAngle() {
                return 2 * Math.PI / 60 / 60 * scope.autoRotateSpeed;
            }
            
            function getZoomScale() {
                return Math.pow( 0.95, scope.zoomSpeed );
            }
            
            function rotateLeft( angle ) {
                sphericalDelta.theta -= angle;
            }
            
            function rotateUp( angle ) {
                sphericalDelta.phi -= angle;
            }
            
            var panLeft = function () {
                var v = new THREE.Vector3();
                return function panLeft( distance, objectMatrix ) {
                    v.setFromMatrixColumn( objectMatrix, 0 );
                    v.multiplyScalar( - distance );
                    panOffset.add( v );
                };
            }();
            
            var panUp = function () {
                var v = new THREE.Vector3();
                return function panUp( distance, objectMatrix ) {
                    if ( scope.screenSpacePanning === true ) {
                        v.setFromMatrixColumn( objectMatrix, 1 );
                    } else {
                        v.setFromMatrixColumn( objectMatrix, 0 );
                        v.crossVectors( scope.object.up, v );
                    }
                    v.multiplyScalar( distance );
                    panOffset.add( v );
                };
            }();
            
            var pan = function () {
                var offset = new THREE.Vector3();
                return function pan( deltaX, deltaY ) {
                    var element = scope.domElement;
                    if ( scope.object.isPerspectiveCamera ) {
                        var position = scope.object.position;
                        offset.copy( position ).sub( scope.target );
                        var targetDistance = offset.length();
                        targetDistance *= Math.tan( ( scope.object.fov / 2 ) * Math.PI / 180.0 );
                        panLeft( 2 * deltaX * targetDistance / element.clientHeight, scope.object.matrix );
                        panUp( 2 * deltaY * targetDistance / element.clientHeight, scope.object.matrix );
                    } else if ( scope.object.isOrthographicCamera ) {
                        panLeft( deltaX * ( scope.object.right - scope.object.left ) / scope.object.zoom / element.clientWidth, scope.object.matrix );
                        panUp( deltaY * ( scope.object.top - scope.object.bottom ) / scope.object.zoom / element.clientHeight, scope.object.matrix );
                    }
                };
            }();
            
            function dollyIn( dollyScale ) {
                if ( scope.object.isPerspectiveCamera ) {
                    scale /= dollyScale;
                } else if ( scope.object.isOrthographicCamera ) {
                    scope.object.zoom = Math.max( scope.minZoom, Math.min( scope.maxZoom, scope.object.zoom * dollyScale ) );
                    scope.object.updateProjectionMatrix();
                    zoomChanged = true;
                }
            }
            
            function dollyOut( dollyScale ) {
                if ( scope.object.isPerspectiveCamera ) {
                    scale *= dollyScale;
                } else if ( scope.object.isOrthographicCamera ) {
                    scope.object.zoom = Math.max( scope.minZoom, Math.min( scope.maxZoom, scope.object.zoom / dollyScale ) );
                    scope.object.updateProjectionMatrix();
                    zoomChanged = true;
                }
            }
            
            function handleMouseDownRotate( event ) {
                rotateStart.set( event.clientX, event.clientY );
            }
            
            function handleMouseDownDolly( event ) {
                dollyStart.set( event.clientX, event.clientY );
            }
            
            function handleMouseDownPan( event ) {
                panStart.set( event.clientX, event.clientY );
            }
            
            function handleMouseMoveRotate( event ) {
                rotateEnd.set( event.clientX, event.clientY );
                rotateDelta.subVectors( rotateEnd, rotateStart ).multiplyScalar( scope.rotateSpeed );
                var element = scope.domElement;
                rotateLeft( 2 * Math.PI * rotateDelta.x / element.clientHeight );
                rotateUp( 2 * Math.PI * rotateDelta.y / element.clientHeight );
                rotateStart.copy( rotateEnd );
                scope.update();
            }
            
            function handleMouseMoveDolly( event ) {
                dollyEnd.set( event.clientX, event.clientY );
                dollyDelta.subVectors( dollyEnd, dollyStart );
                if ( dollyDelta.y > 0 ) {
                    dollyIn( getZoomScale() );
                } else if ( dollyDelta.y < 0 ) {
                    dollyOut( getZoomScale() );
                }
                dollyStart.copy( dollyEnd );
                scope.update();
            }
            
            function handleMouseMovePan( event ) {
                panEnd.set( event.clientX, event.clientY );
                panDelta.subVectors( panEnd, panStart ).multiplyScalar( scope.panSpeed );
                pan( panDelta.x, panDelta.y );
                panStart.copy( panEnd );
                scope.update();
            }
            
            function handleMouseWheel( event ) {
                if ( event.deltaY < 0 ) {
                    dollyOut( getZoomScale() );
                } else if ( event.deltaY > 0 ) {
                    dollyIn( getZoomScale() );
                }
                scope.update();
            }
            
            function handleTouchStartRotate( event ) {
                if ( event.touches.length == 1 ) {
                    rotateStart.set( event.touches[ 0 ].pageX, event.touches[ 0 ].pageY );
                } else {
                    var x = 0.5 * ( event.touches[ 0 ].pageX + event.touches[ 1 ].pageX );
                    var y = 0.5 * ( event.touches[ 0 ].pageY + event.touches[ 1 ].pageY );
                    rotateStart.set( x, y );
                }
            }
            
            function handleTouchStartPan( event ) {
                if ( event.touches.length == 1 ) {
                    panStart.set( event.touches[ 0 ].pageX, event.touches[ 0 ].pageY );
                } else {
                    var x = 0.5 * ( event.touches[ 0 ].pageX + event.touches[ 1 ].pageX );
                    var y = 0.5 * ( event.touches[ 0 ].pageY + event.touches[ 1 ].pageY );
                    panStart.set( x, y );
                }
            }
            
            function handleTouchStartDolly( event ) {
                var dx = event.touches[ 0 ].pageX - event.touches[ 1 ].pageX;
                var dy = event.touches[ 0 ].pageY - event.touches[ 1 ].pageY;
                var distance = Math.sqrt( dx * dx + dy * dy );
                dollyStart.set( 0, distance );
            }
            
            function handleTouchMoveRotate( event ) {
                if ( event.touches.length == 1 ) {
                    rotateEnd.set( event.touches[ 0 ].pageX, event.touches[ 0 ].pageY );
                } else {
                    var x = 0.5 * ( event.touches[ 0 ].pageX + event.touches[ 1 ].pageX );
                    var y = 0.5 * ( event.touches[ 0 ].pageY + event.touches[ 1 ].pageY );
                    rotateEnd.set( x, y );
                }
                rotateDelta.subVectors( rotateEnd, rotateStart ).multiplyScalar( scope.rotateSpeed );
                var element = scope.domElement;
                rotateLeft( 2 * Math.PI * rotateDelta.x / element.clientHeight );
                rotateUp( 2 * Math.PI * rotateDelta.y / element.clientHeight );
                rotateStart.copy( rotateEnd );
            }
            
            function handleTouchMovePan( event ) {
                if ( event.touches.length == 1 ) {
                    panEnd.set( event.touches[ 0 ].pageX, event.touches[ 0 ].pageY );
                } else {
                    var x = 0.5 * ( event.touches[ 0 ].pageX + event.touches[ 1 ].pageX );
                    var y = 0.5 * ( event.touches[ 0 ].pageY + event.touches[ 1 ].pageY );
                    panEnd.set( x, y );
                }
                panDelta.subVectors( panEnd, panStart ).multiplyScalar( scope.panSpeed );
                pan( panDelta.x, panDelta.y );
                panStart.copy( panEnd );
            }
            
            function handleTouchMoveDolly( event ) {
                var dx = event.touches[ 0 ].pageX - event.touches[ 1 ].pageX;
                var dy = event.touches[ 0 ].pageY - event.touches[ 1 ].pageY;
                var distance = Math.sqrt( dx * dx + dy * dy );
                dollyEnd.set( 0, distance );
                dollyDelta.set( 0, Math.pow( dollyEnd.y / dollyStart.y, scope.zoomSpeed ) );
                dollyIn( dollyDelta.y );
                dollyStart.copy( dollyEnd );
            }
            
            function onMouseDown( event ) {
                if ( scope.enabled === false ) return;
                event.preventDefault();
                switch ( event.button ) {
                    case scope.mouseButtons.LEFT:
                        if ( event.ctrlKey || event.metaKey || event.shiftKey ) {
                            if ( scope.enablePan === false ) return;
                            handleMouseDownPan( event );
                            state = STATE.PAN;
                        } else {
                            if ( scope.enableRotate === false ) return;
                            handleMouseDownRotate( event );
                            state = STATE.ROTATE;
                        }
                        break;
                    case scope.mouseButtons.MIDDLE:
                        if ( scope.enableZoom === false ) return;
                        handleMouseDownDolly( event );
                        state = STATE.DOLLY;
                        break;
                    case scope.mouseButtons.RIGHT:
                        if ( scope.enablePan === false ) return;
                        handleMouseDownPan( event );
                        state = STATE.PAN;
                        break;
                }
                if ( state !== STATE.NONE ) {
                    document.addEventListener( 'mousemove', onMouseMove, false );
                    document.addEventListener( 'mouseup', onMouseUp, false );
                    scope.dispatchEvent( startEvent );
                }
            }
            
            function onMouseMove( event ) {
                if ( scope.enabled === false ) return;
                event.preventDefault();
                switch ( state ) {
                    case STATE.ROTATE:
                        if ( scope.enableRotate === false ) return;
                        handleMouseMoveRotate( event );
                        break;
                    case STATE.DOLLY:
                        if ( scope.enableZoom === false ) return;
                        handleMouseMoveDolly( event );
                        break;
                    case STATE.PAN:
                        if ( scope.enablePan === false ) return;
                        handleMouseMovePan( event );
                        break;
                }
            }
            
            function onMouseUp( event ) {
                if ( scope.enabled === false ) return;
                document.removeEventListener( 'mousemove', onMouseMove, false );
                document.removeEventListener( 'mouseup', onMouseUp, false );
                scope.dispatchEvent( endEvent );
                state = STATE.NONE;
            }
            
            function onMouseWheel( event ) {
                if ( scope.enabled === false || scope.enableZoom === false || ( state !== STATE.NONE && state !== STATE.ROTATE ) ) return;
                event.preventDefault();
                event.stopPropagation();
                scope.dispatchEvent( startEvent );
                handleMouseWheel( event );
                scope.dispatchEvent( endEvent );
            }
            
            function onTouchStart( event ) {
                if ( scope.enabled === false ) return;
                event.preventDefault();
                switch ( event.touches.length ) {
                    case 1:
                        switch ( scope.touches.ONE ) {
                            case THREE.TOUCH.ROTATE:
                                if ( scope.enableRotate === false ) return;
                                handleTouchStartRotate( event );
                                state = STATE.TOUCH_ROTATE;
                                break;
                            case THREE.TOUCH.PAN:
                                if ( scope.enablePan === false ) return;
                                handleTouchStartPan( event );
                                state = STATE.TOUCH_PAN;
                                break;
                            default:
                                state = STATE.NONE;
                        }
                        break;
                    case 2:
                        switch ( scope.touches.TWO ) {
                            case THREE.TOUCH.DOLLY_PAN:
                                if ( scope.enableZoom === false && scope.enablePan === false ) return;
                                handleTouchStartDolly( event );
                                handleTouchStartPan( event );
                                state = STATE.TOUCH_DOLLY_PAN;
                                break;
                            case THREE.TOUCH.DOLLY_ROTATE:
                                if ( scope.enableZoom === false && scope.enableRotate === false ) return;
                                handleTouchStartDolly( event );
                                handleTouchStartRotate( event );
                                state = STATE.TOUCH_DOLLY_ROTATE;
                                break;
                            default:
                                state = STATE.NONE;
                        }
                        break;
                    default:
                        state = STATE.NONE;
                }
                if ( state !== STATE.NONE ) {
                    scope.dispatchEvent( startEvent );
                }
            }
            
            function onTouchMove( event ) {
                if ( scope.enabled === false ) return;
                event.preventDefault();
                event.stopPropagation();
                switch ( state ) {
                    case STATE.TOUCH_ROTATE:
                        if ( scope.enableRotate === false ) return;
                        handleTouchMoveRotate( event );
                        scope.update();
                        break;
                    case STATE.TOUCH_PAN:
                        if ( scope.enablePan === false ) return;
                        handleTouchMovePan( event );
                        scope.update();
                        break;
                    case STATE.TOUCH_DOLLY_PAN:
                        if ( scope.enableZoom === false && scope.enablePan === false ) return;
                        handleTouchMoveDolly( event );
                        handleTouchMovePan( event );
                        scope.update();
                        break;
                    case STATE.TOUCH_DOLLY_ROTATE:
                        if ( scope.enableZoom === false && scope.enableRotate === false ) return;
                        handleTouchMoveDolly( event );
                        handleTouchMoveRotate( event );
                        scope.update();
                        break;
                    default:
                        state = STATE.NONE;
                }
            }
            
            function onTouchEnd( event ) {
                if ( scope.enabled === false ) return;
                scope.dispatchEvent( endEvent );
                state = STATE.NONE;
            }
            
            function onContextMenu( event ) {
                if ( scope.enabled === false ) return;
                event.preventDefault();
            }
            
            scope.domElement.addEventListener( 'contextmenu', onContextMenu, false );
            scope.domElement.addEventListener( 'mousedown', onMouseDown, false );
            scope.domElement.addEventListener( 'wheel', onMouseWheel, false );
            scope.domElement.addEventListener( 'touchstart', onTouchStart, false );
            scope.domElement.addEventListener( 'touchend', onTouchEnd, false );
            scope.domElement.addEventListener( 'touchmove', onTouchMove, false );
            
            this.update = function () {
                var offset = new THREE.Vector3();
                var quat = new THREE.Quaternion().setFromUnitVectors( object.up, new THREE.Vector3( 0, 1, 0 ) );
                var quatInverse = quat.clone().invert();
                var lastPosition = new THREE.Vector3();
                var lastQuaternion = new THREE.Quaternion();
                
                return function update() {
                    var position = scope.object.position;
                    offset.copy( position ).sub( scope.target );
                    offset.applyQuaternion( quat );
                    spherical.setFromVector3( offset );
                    
                    if ( scope.autoRotate && state === STATE.NONE ) {
                        rotateLeft( getAutoRotationAngle() );
                    }
                    
                    if ( scope.enableDamping ) {
                        spherical.theta += sphericalDelta.theta * scope.dampingFactor;
                        spherical.phi += sphericalDelta.phi * scope.dampingFactor;
                    } else {
                        spherical.theta += sphericalDelta.theta;
                        spherical.phi += sphericalDelta.phi;
                    }
                    
                    spherical.theta = Math.max( scope.minAzimuthAngle, Math.min( scope.maxAzimuthAngle, spherical.theta ) );
                    spherical.phi = Math.max( scope.minPolarAngle, Math.min( scope.maxPolarAngle, spherical.phi ) );
                    spherical.makeSafe();
                    spherical.radius *= scale;
                    spherical.radius = Math.max( scope.minDistance, Math.min( scope.maxDistance, spherical.radius ) );
                    
                    if ( scope.enableDamping === true ) {
                        scope.target.addScaledVector( panOffset, scope.dampingFactor );
                    } else {
                        scope.target.add( panOffset );
                    }
                    
                    offset.setFromSpherical( spherical );
                    offset.applyQuaternion( quatInverse );
                    position.copy( scope.target ).add( offset );
                    scope.object.lookAt( scope.target );
                    
                    if ( scope.enableDamping === true ) {
                        sphericalDelta.theta *= ( 1 - scope.dampingFactor );
                        sphericalDelta.phi *= ( 1 - scope.dampingFactor );
                        panOffset.multiplyScalar( 1 - scope.dampingFactor );
                    } else {
                        sphericalDelta.set( 0, 0, 0 );
                        panOffset.set( 0, 0, 0 );
                    }
                    
                    scale = 1;
                    
                    if ( zoomChanged ||
                        lastPosition.distanceToSquared( scope.object.position ) > EPS ||
                        8 * ( 1 - lastQuaternion.dot( scope.object.quaternion ) ) > EPS ) {
                        scope.dispatchEvent( changeEvent );
                        lastPosition.copy( scope.object.position );
                        lastQuaternion.copy( scope.object.quaternion );
                        zoomChanged = false;
                        return true;
                    }
                    return false;
                };
            }();
            
            this.dispose = function () {
                scope.domElement.removeEventListener( 'contextmenu', onContextMenu, false );
                scope.domElement.removeEventListener( 'mousedown', onMouseDown, false );
                scope.domElement.removeEventListener( 'wheel', onMouseWheel, false );
                scope.domElement.removeEventListener( 'touchstart', onTouchStart, false );
                scope.domElement.removeEventListener( 'touchend', onTouchEnd, false );
                scope.domElement.removeEventListener( 'touchmove', onTouchMove, false );
                document.removeEventListener( 'mousemove', onMouseMove, false );
                document.removeEventListener( 'mouseup', onMouseUp, false );
            };
            
            this.reset = function () {
                scope.target.copy( scope.target0 );
                scope.object.position.copy( scope.position0 );
                scope.object.zoom = scope.zoom0;
                scope.object.updateProjectionMatrix();
                scope.dispatchEvent( changeEvent );
                scope.update();
                state = STATE.NONE;
            };
            
            this.update();
        };

        THREE.OrbitControls.prototype = Object.create( THREE.EventDispatcher.prototype );
        THREE.OrbitControls.prototype.constructor = THREE.OrbitControls;
    </script>

    <script>
        let camera, scene1, scene2, renderer, controls;
        let renderTarget1, renderTarget2;
        let transitionScene, transitionCamera, transitionMaterial;
        let isTransitioning = false;
        let transitionProgress = 0;
        let currentScene = 1;

        const params = {
            transitionDuration: 2.0, // 秒
            transitionDirection: 'leftToRight',
            useColorSpaceCorrection: true
        };

        init();
        animate();

        function init() {
            // 渲染器
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.outputColorSpace = THREE.SRGBColorSpace;
            document.body.appendChild(renderer.domElement);

            // 相机
            camera = new THREE.PerspectiveCamera(
                75,
                window.innerWidth / window.innerHeight,
                0.1,
                1000
            );
            camera.position.set(0, 2, 5);

            // OrbitControls
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;

            // 场景 1 - 红色场景
            scene1 = createScene1();

            // 场景 2 - 蓝色场景
            scene2 = createScene2();

            // RenderTargets
            renderTarget1 = new THREE.WebGLRenderTarget(
                window.innerWidth,
                window.innerHeight,
                {
                    minFilter: THREE.LinearFilter,
                    magFilter: THREE.LinearFilter,
                    format: THREE.RGBAFormat,
                    colorSpace: THREE.LinearSRGBColorSpace
                }
            );

            renderTarget2 = new THREE.WebGLRenderTarget(
                window.innerWidth,
                window.innerHeight,
                {
                    minFilter: THREE.LinearFilter,
                    magFilter: THREE.LinearFilter,
                    format: THREE.RGBAFormat,
                    colorSpace: THREE.LinearSRGBColorSpace
                }
            );

            // 转场场景
            transitionScene = new THREE.Scene();
            transitionCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

            // 转场 Shader
            transitionMaterial = new THREE.ShaderMaterial({
                uniforms: {
                    tDiffuse1: { value: renderTarget1.texture },
                    tDiffuse2: { value: renderTarget2.texture },
                    progress: { value: 0.0 }
                },
                vertexShader: `
                    varying vec2 vUv;
                    void main() {
                        vUv = uv;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
               fragmentShader: `
    uniform sampler2D tDiffuse1;
    uniform sampler2D tDiffuse2;
    uniform float progress;
    varying vec2 vUv;

    // 【关键修正】使用标准的 sRGB 转换函数
    // 这比之前的 pow(color, 1.0/2.2) 更精确，能与 Three.js 主渲染器完全对齐
    vec3 LinearToSRGB(vec3 color) {
        // sRGB 转换曲线公式：
        // 如果颜色值很小（暗部），使用线性放大
        // 否则使用 Gamma 2.4 曲线校正（0.41666 ≈ 1.0/2.4）
        return mix(
            color * 12.92, 
            pow(color, vec3(0.41666)) * 1.055 - vec3(0.055), 
            step(0.0031308, color)
        );
    }

    void main() {
        vec4 color1 = texture2D(tDiffuse1, vUv);
        vec4 color2 = texture2D(tDiffuse2, vUv);
        
        float threshold = progress;
        float edge = 0.05;
        
        float mixFactor = smoothstep(threshold - edge, threshold + edge, vUv.x);
        
        // 1. 在线性空间混合（这是物理正确的）
        vec3 blended = mix(color2.rgb, color1.rgb, mixFactor);
        
        // 2. 必须转回 sRGB 才能输出到屏幕，否则会变暗！
        blended = LinearToSRGB(blended);
        
        gl_FragColor = vec4(blended, 1.0);
    }
`,

                depthTest: false,
                depthWrite: false
            });

            const plane = new THREE.PlaneGeometry(2, 2);
            const quad = new THREE.Mesh(plane, transitionMaterial);
            transitionScene.add(quad);

            // GUI
            const gui = new dat.GUI();
            gui.add(params, 'transitionDuration', 0.5, 5.0, 0.1).name('转场时长(秒)');
            gui.add(params, 'useColorSpaceCorrection').name('颜色空间校正');

            // 按钮事件
            document.getElementById('transitionBtn').addEventListener('click', startTransition);

            // 窗口调整
            window.addEventListener('resize', onWindowResize);
        }

        function createScene1() {
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x330000);

            // 添加多个物体
            const geometry1 = new THREE.BoxGeometry(1, 1, 1);
            const material1 = new THREE.MeshStandardMaterial({ 
                color: 0xff3333,
                metalness: 0.3,
                roughness: 0.4
            });
            
            for (let i = 0; i < 5; i++) {
                const cube = new THREE.Mesh(geometry1, material1);
                cube.position.x = (i - 2) * 2;
                cube.position.y = Math.sin(i) * 0.5;
                scene.add(cube);
            }

            // 添加球体
            const sphereGeo = new THREE.SphereGeometry(0.5, 32, 32);
            const sphereMat = new THREE.MeshStandardMaterial({ 
                color: 0xff6666,
                metalness: 0.5,
                roughness: 0.3
            });
            const sphere = new THREE.Mesh(sphereGeo, sphereMat);
            sphere.position.y = 2;
            scene.add(sphere);

            // 光照
            const light1 = new THREE.DirectionalLight(0xffffff, 1);
            light1.position.set(5, 5, 5);
            scene.add(light1);
            scene.add(new THREE.AmbientLight(0x404040, 0.5));

            // 地面
            const groundGeo = new THREE.PlaneGeometry(20, 20);
            const groundMat = new THREE.MeshStandardMaterial({ color: 0x660000 });
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.position.y = -1;
            scene.add(ground);

            return scene;
        }

        function createScene2() {
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000033);

            // 添加多个圆锥
            const geometry2 = new THREE.ConeGeometry(0.5, 1.5, 32);
            const material2 = new THREE.MeshStandardMaterial({ 
                color: 0x3333ff,
                metalness: 0.3,
                roughness: 0.4
            });
            
            for (let i = 0; i < 5; i++) {
                const cone = new THREE.Mesh(geometry2, material2);
                cone.position.x = (i - 2) * 2;
                cone.position.y = Math.cos(i) * 0.5;
                scene.add(cone);
            }

            // 添加环形
            const torusGeo = new THREE.TorusGeometry(0.7, 0.2, 16, 100);
            const torusMat = new THREE.MeshStandardMaterial({ 
                color: 0x6666ff,
                metalness: 0.5,
                roughness: 0.3
            });
            const torus = new THREE.Mesh(torusGeo, torusMat);
            torus.position.y = 2;
            scene.add(torus);

            // 光照
            const light2 = new THREE.DirectionalLight(0xffffff, 1);
            light2.position.set(-5, 5, 5);
            scene.add(light2);
            scene.add(new THREE.AmbientLight(0x404040, 0.5));

            // 地面
            const groundGeo = new THREE.PlaneGeometry(20, 20);
            const groundMat = new THREE.MeshStandardMaterial({ color: 0x000066 });
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.position.y = -1;
            scene.add(ground);

            return scene;
        }

        function startTransition() {
            if (isTransitioning) return;
            
            isTransitioning = true;
            transitionProgress = 0;
            
            // 切换场景
            currentScene = currentScene === 1 ? 2 : 1;
            
            document.getElementById('transitionBtn').disabled = true;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();

            renderer.setSize(window.innerWidth, window.innerHeight);
            renderTarget1.setSize(window.innerWidth, window.innerHeight);
            renderTarget2.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            controls.update();

            if (isTransitioning) {
                // 更新转场进度
                transitionProgress += 1 / (params.transitionDuration * 60);
                
                if (transitionProgress >= 1.0) {
                    transitionProgress = 1.0;
                    isTransitioning = false;
                    document.getElementById('transitionBtn').disabled = false;
                }

                transitionMaterial.uniforms.progress.value = transitionProgress;

                // 渲染两个场景到 RenderTarget
                renderer.setRenderTarget(renderTarget1);
                renderer.render(currentScene === 1 ? scene2 : scene1, camera);

                renderer.setRenderTarget(renderTarget2);
                renderer.render(currentScene === 1 ? scene1 : scene2, camera);

                // 使用转场 shader 渲染到屏幕
                renderer.setRenderTarget(null);
                renderer.render(transitionScene, transitionCamera);
            } else {
                // 转场完成，直接渲染当前场景
                renderer.setRenderTarget(null);
                renderer.render(currentScene === 1 ? scene1 : scene2, camera);
            }
        }
    </script>
</body>
