<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>Multi Scene Mix Shader Transition</title>
  <style>
    body { margin: 0; overflow: hidden; background: #000; }
    canvas { display: block; }
  </style>
</head>
<body>
<script src="https://unpkg.com/three@0.158.0/build/three.min.js"></script>
<script src="https://unpkg.com/dat.gui@0.7.9/build/dat.gui.min.js"></script>
<script>
  class SceneManager {
    constructor() {
      this.renderer = null;
      this.camera = null;
      this.scenes = [];
      this.renderTargets = [];
      this.carMeshes = [];
      this.screenScene = null;
      this.screenCamera = null;
      this.screenQuad = null;
      this.params = null;
      this.lastTime = performance.now();
      this.init();
    }

    init() {
      const w = window.innerWidth;
      const h = window.innerHeight;

      // 初始化渲染器
      this.renderer = new THREE.WebGLRenderer({ antialias: true });
      this.renderer.setPixelRatio(window.devicePixelRatio);
      this.renderer.setSize(w, h);
      document.body.appendChild(this.renderer.domElement);

      // 初始化相机
      this.camera = new THREE.PerspectiveCamera(60, w / h, 0.1, 100);
      this.camera.position.set(0, 2, 6);

      // 创建多个场景
      this.createScenes();

      // 初始化屏幕混合场景
      this.setupScreenScene();

      // 初始化 GUI
      this.setupGUI();

      // 监听窗口变化
      window.addEventListener('resize', () => this.onWindowResize(), false);

      // 开始动画循环
      this.animate();
    }

    createScenes() {
      const sceneCount = 3;
      for (let i = 0; i < sceneCount; i++) {
        const scene = new THREE.Scene();
        scene.background = new THREE.Color().setHSL(i / sceneCount, 0.4, 0.1);

        // 添加灯光
        const ambient = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambient);

        const dir = new THREE.DirectionalLight(0xffffff, 0.8);
        dir.position.set(5, 10, 5);
        scene.add(dir);

        // 添加地面
        const groundGeo = new THREE.PlaneGeometry(20, 20);
        const groundMat = new THREE.MeshStandardMaterial({
          color: new THREE.Color().setHSL(i / sceneCount, 0.3, 0.3)
        });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        // 添加车（方块）
        const carGeo = new THREE.BoxGeometry(1, 0.5, 2);
        const carMat = new THREE.MeshStandardMaterial({
          color: new THREE.Color().setHSL(i / sceneCount, 0.7, 0.6),
          emissive: 0x000000
        });
        const car = new THREE.Mesh(carGeo, carMat);
        car.position.set(0, 0.25, 0);
        scene.add(car);

        // 添加额外物体
        const extraGeo = new THREE.BoxGeometry(0.5, 1, 0.5);
        for (let j = 0; j < 5; j++) {
          const extraMat = new THREE.MeshStandardMaterial({
            color: new THREE.Color().setHSL(i / sceneCount, 0.5, 0.5 + j * 0.05)
          });
          const extra = new THREE.Mesh(extraGeo, extraMat);
          extra.position.set(-4 + j * 2, 0.5, -3 - i * 2);
          scene.add(extra);
        }

        this.scenes.push(scene);
        this.carMeshes.push(car);

        // 创建渲染目标
        const rt = new THREE.WebGLRenderTarget(
          window.innerWidth * window.devicePixelRatio,
          window.innerHeight * window.devicePixelRatio,
          { samples: 4 }
        );
        this.renderTargets.push(rt);
      }
    }

    setupScreenScene() {
      this.screenScene = new THREE.Scene();
      this.screenCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

      const quadGeo = new THREE.PlaneGeometry(2, 2);
      const quadMat = new THREE.ShaderMaterial({
        uniforms: {
          tSceneA: { value: null },
          tSceneB: { value: null },
          progress: { value: 0.0 }
        },
        vertexShader: `
          varying vec2 vUv;
          void main() {
            vUv = uv;
            gl_Position = vec4(position, 1.0);
          }
        `,
        fragmentShader: `
          uniform sampler2D tSceneA;
          uniform sampler2D tSceneB;
          uniform float progress;
          varying vec2 vUv;

          void main() {
            vec4 colorA = texture2D(tSceneA, vUv);
            vec4 colorB = texture2D(tSceneB, vUv);

            // 从左到右划过
            float edge = smoothstep(progress - 0.02, progress + 0.02, vUv.x);
            vec4 mixed = mix(colorA, colorB, edge);

            gl_FragColor = mixed;
          }
        `,
        depthTest: false,
        depthWrite: false
      });

      this.screenQuad = new THREE.Mesh(quadGeo, quadMat);
      this.screenScene.add(this.screenQuad);
    }

    setupGUI() {
      this.params = {
        fromScene: 0,
        toScene: 1,
        progress: 0.0,
        autoPlay: false,
        speed: 0.5
      };

      const gui = new dat.GUI();
      gui.add(this.params, 'fromScene', 0, this.scenes.length - 1, 1).name('From Scene');
      gui.add(this.params, 'toScene', 0, this.scenes.length - 1, 1).name('To Scene');
      gui.add(this.params, 'progress', 0, 1, 0.001).name('Progress');
      gui.add(this.params, 'autoPlay').name('Auto Play');
      gui.add(this.params, 'speed', 0.1, 2, 0.1).name('Speed');
    }

    onWindowResize() {
      const w = window.innerWidth;
      const h = window.innerHeight;

      this.renderer.setSize(w, h);
      this.camera.aspect = w / h;
      this.camera.updateProjectionMatrix();

      const dpr = window.devicePixelRatio;
      for (let i = 0; i < this.renderTargets.length; i++) {
        this.renderTargets[i].setSize(w * dpr, h * dpr);
      }
    }

    updateLogic(dt) {
      // 车和摄像机的统一运动
      const t = performance.now() * 0.001;

      const carZ = Math.sin(t) * 4.0;
      const carX = Math.cos(t * 0.5) * 2.0;

      for (let i = 0; i < this.carMeshes.length; i++) {
        const car = this.carMeshes[i];
        car.position.x = carX;
        car.position.z = carZ;
        car.rotation.y = Math.atan2(
          Math.cos(t * 0.5) * 2.0,
          Math.cos(t) * 4.0
        );
      }

      this.camera.position.x = carX + 4 * Math.sin(t * 0.3);
      this.camera.position.y = 2 + Math.sin(t * 0.5) * 0.5;
      this.camera.position.z = carZ + 6 * Math.cos(t * 0.3);
      this.camera.lookAt(carX, 0.5, carZ);

      if (this.params.autoPlay) {
        this.params.progress += dt * this.params.speed * 0.2;
        if (this.params.progress > 1.0) {
          this.params.progress = 0.0;
          this.params.fromScene = this.params.toScene;
          this.params.toScene = (this.params.toScene + 1) % this.scenes.length;
        }
      }
    }

    render() {
      // 先把每个场景渲染到自己的 RenderTarget
      for (let i = 0; i < this.scenes.length; i++) {
        this.renderer.setRenderTarget(this.renderTargets[i]);
        this.renderer.clear();
        this.renderer.render(this.scenes[i], this.camera);
      }

      this.renderer.setRenderTarget(null);

      // 选择要混合的两个场景
      const fromIndex = THREE.MathUtils.clamp(this.params.fromScene, 0, this.scenes.length - 1);
      const toIndex = THREE.MathUtils.clamp(this.params.toScene, 0, this.scenes.length - 1);

      this.screenQuad.material.uniforms.tSceneA.value = this.renderTargets[fromIndex].texture;
      this.screenQuad.material.uniforms.tSceneB.value = this.renderTargets[toIndex].texture;
      this.screenQuad.material.uniforms.progress.value = this.params.progress;

      this.renderer.render(this.screenScene, this.screenCamera);
    }

    animate() {
      requestAnimationFrame(() => this.animate());

      const now = performance.now();
      const dt = (now - this.lastTime) / 1000;
      this.lastTime = now;

      this.updateLogic(dt);
      this.render();
    }
  }

  // 实例化 SceneManager
  new SceneManager();
</script>
</body>
</html>
