<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>物理一致性超车演示 - 同向行驶</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: #fff; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 5px; pointer-events: none; border: 1px solid #444; }
        .val { color: #ff3300; font-weight: bold; }
    </style>
</head>
<body>
    <div id="ui">
        <b>物理动力学：同向超车</b><br><br>
        1. 统一方向：均向 <span class="val">Z 轴正方向</span> 行驶<br>
        2. 转向限制：前轮最大转角 <span class="val">15°</span><br>
        3. 逻辑：车速快于前车时，物理切向变道
    </div>

    <script src="../../libs/three.js"></script>
    <script src="../../libs/OrbitControls.js"></script>


    <script >
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(10, 10, 130); // 放在侧后方高处
        const renderer = new THREE.WebGLRenderer({ antialias: true });
const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0x555555));
        const light = new THREE.DirectionalLight(0xffffff, 1.2);
        light.position.set(10, 20, 10);
        scene.add(light);

        // 路面辅助
        const grid = new THREE.GridHelper(1000, 100, 0x222222, 0x222222);
        scene.add(grid);

        class Car {
            constructor(color, speed, startZ, isFast = false) {
                this.mesh = new THREE.Group();
                // 身体：Z轴方向是长边
                const body = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.5, 2.4), new THREE.MeshStandardMaterial({ color }));
                this.mesh.add(body);
                // 车头：在 Z+ 方向
                const nose = new THREE.Mesh(new THREE.BoxGeometry(1.1, 0.1, 0.5), new THREE.MeshStandardMaterial({ color: 0xffffff }));
                nose.position.set(0, 0.25, 1.0);
                this.mesh.add(nose);
                scene.add(this.mesh);

                this.speed = speed;
                this.wheelbase = 2.0;
                this.maxSteerAngle = Math.PI / 12; // 15度
                
                // 物理状态
                this.mesh.position.set(0, 0, startZ);
                this.mesh.rotation.y = 0; // 默认朝向 Z+
                
                this.targetX = 0;
                this.isFast = isFast;
                this.trail = [];
            }

            update(delta, otherCar = null) {
                // 1. 超车决策
                if (this.isFast && otherCar) {
                    const relativeZ = otherCar.position.z - this.mesh.position.z;
                    // 如果快车在慢车后面 5-25 个单位，变道
                    if (relativeZ > -25 && relativeZ < 10) {
                        this.targetX = 4.0;
                    } else {
                        this.targetX = 0;
                    }
                }

                // 2. 物理追踪逻辑 (Pure Pursuit)
                // 目标点在车头前方 12 个单位
                const localForward = new THREE.Vector3(0, 0, 12);
                localForward.applyQuaternion(this.mesh.quaternion);
                const targetPos = new THREE.Vector3(
                    this.targetX, 
                    0, 
                    this.mesh.position.z + localForward.z
                );
                
                // 计算目标点在车辆本地坐标系下的位置
                const localTarget = this.mesh.worldToLocal(targetPos.clone());
                
                // 计算所需的转向角：delta = atan(2 * L * sin(alpha) / distance)
                const distance = localTarget.length();
                // z 轴正方向到点 (z, x) 的夹角, alpha 是和目标点的夹角
                const alpha = Math.atan2(localTarget.x, localTarget.z);
                let steeringAngle = Math.atan2(2 * this.wheelbase * Math.sin(alpha), distance);

                // --- 15度限位 ---
                steeringAngle = THREE.MathUtils.clamp(steeringAngle, -this.maxSteerAngle, this.maxSteerAngle);

                // 3. 应用动力学
                // 偏航角变化率 = (速度 / 轴距) * tan(转向角)
                // R = L / tan(θ), yawRate = v / R = v * tan(θ) / L，θ是转向角
                // 角速度 = 转过的角度 / 时间 = (走过的弧长 / R) / 时间 = 速度 / R
                const yawRate = (this.speed / this.wheelbase) * Math.tan(steeringAngle);
                this.mesh.rotation.y += yawRate * delta;

                // 位移：永远沿着车子自身的本地 Z 轴前进
                const direction = new THREE.Vector3(0, 0, 1);
                direction.applyQuaternion(this.mesh.quaternion);
                this.mesh.position.add(direction.multiplyScalar(this.speed * delta));

                // 4. 辅助线：记录物理轨迹
                if (Math.random() > 0.8) this.drawDot();
            }

            drawDot() {
                const dot = new THREE.Mesh(new THREE.SphereGeometry(0.1), new THREE.MeshBasicMaterial({ color: this.mesh.children[0].material.color }));
                dot.position.copy(this.mesh.position);
                scene.add(dot);
                this.trail.push(dot);
                if (this.trail.length > 100) scene.remove(this.trail.shift());
            }
        }

        // 白车在前面（Z=50），红车在后面（Z=0）追
        const slowCar = new Car(0xaaaaaa, 12, 50, false);
        const fastCar = new Car(0xff3300, 22, 0, true);
        const fastCar2 = new Car(0xff3300, 16, -20, true);

        function animate() {
            requestAnimationFrame(animate);
            const delta = 0.016;
controls.update();
            slowCar.update(delta);
            fastCar.update(delta, slowCar.mesh);
            fastCar2.update(delta, slowCar.mesh);
controls.target.copy(slowCar.mesh.position);
            // 相机动态跟随
            //camera.position.set(fastCar.mesh.position.x + 12, 12, fastCar.mesh.position.z - 15);
            //camera.lookAt(fastCar.mesh.position.x, 0, fastCar.mesh.position.z + 10);

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
